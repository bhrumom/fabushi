name: Sync Video Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'

      - name: Sync Video Feed
        run: |
          chmod +x sync_video_feed.sh
          ./sync_video_feed.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: sync video_feed from upstream'
          title: 'Sync Video Feed Module'
          body: 'Auto sync video_feed updates from GitHub'
          branch: sync/video-feed
