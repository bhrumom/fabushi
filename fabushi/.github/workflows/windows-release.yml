name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.1.0)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true
      
      - name: Flutter version
        run: flutter --version
      
      - name: Use Windows-specific pubspec
        shell: pwsh
        run: |
          # Use Windows-specific pubspec that excludes mobile-only packages
          if (Test-Path "pubspec_windows.yaml") {
            Copy-Item pubspec_windows.yaml pubspec.yaml -Force
            Write-Host "Using pubspec_windows.yaml for Windows build"
          } else {
            Write-Host "pubspec_windows.yaml not found, using default pubspec.yaml"
          }
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Windows Release
        run: flutter build windows --release
      
      - name: Create MSIX package
        run: dart run msix:create
      
      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref }}" -match "refs/tags/(.*)") {
            $version = $matches[1]
          } else {
            $version = "v1.1.0"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
      
      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          
          # Create release folder
          New-Item -ItemType Directory -Force -Path "release"
          
          # Copy MSIX package
          $msixPath = Get-ChildItem -Path "build\windows\x64\runner\Release" -Filter "*.msix" -Recurse | Select-Object -First 1
          if ($msixPath) {
            Copy-Item $msixPath.FullName -Destination "release\大乘-$version-windows.msix"
          }
          
          # Create ZIP of the portable version
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "release\大乘-$version-windows-portable.zip"
          
          # List release contents
          Get-ChildItem -Path "release"
      
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: release/*.msix
          if-no-files-found: warn
      
      - name: Upload Portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/*.zip
          if-no-files-found: warn
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.msix
            release/*.zip
          body: |
            ## 大乘 ${{ steps.get_version.outputs.VERSION }}
            
            ### Windows 安装包
            
            #### MSIX 安装包 (推荐)
            - `大乘-${{ steps.get_version.outputs.VERSION }}-windows.msix` - Windows 10/11 安装包
            
            #### 便携版
            - `大乘-${{ steps.get_version.outputs.VERSION }}-windows-portable.zip` - 解压即用，无需安装
            
            ### 安装说明
            
            **MSIX 安装包**:
            1. 下载 `.msix` 文件
            2. 双击运行安装
            3. 按照提示完成安装
            
            **便携版**:
            1. 下载 `.zip` 文件
            2. 解压到任意目录
            3. 运行 `global_dharma_sharing.exe`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
