# Flutter配置文件
# 用于解决平台兼容性问题

# 禁用Linux桌面平台
enable-linux-desktop: false

# 配置插件平台支持
plugin-platforms:
  file_picker:
    web: true
    android: true
    ios: true
    macos: false
    windows: false
    linux: false
  
  flutter_local_notifications:
    web: false
    android: true
    ios: true
    macos: true
    windows: false
    linux: false