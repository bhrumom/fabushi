<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A, #CDDC39);
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            position: relative;
            animation: pulse 2s infinite;
        }
        
        .success-icon::before {
            content: '✓';
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        p {
            color: #666;
            margin: 0 0 20px 0;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .countdown {
            font-size: 18px;
            color: #4CAF50;
            font-weight: 600;
            margin: 20px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 100%;
        }
        
        .close-hint {
            font-size: 14px;
            color: #999;
            margin-top: 15px;
            font-style: italic;
        }
        
        .manual-close {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .manual-close:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container fade-in">
        <div class="success-icon"></div>
        <h1>支付成功！</h1>
        <p>您的会员已成功激活</p>
        <div class="countdown" id="countdown">3 秒后自动关闭</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="close-hint">页面即将自动关闭</p>
        <button class="manual-close" onclick="closeWindow()">立即关闭</button>
    </div>

    <script>
        let countdown = 3;
        let progress = 100;
        const countdownElement = document.getElementById('countdown');
        const progressFill = document.getElementById('progressFill');
        
        function updateCountdown() {
            countdown--;
            progress = (countdown / 3) * 100;
            
            if (countdown >= 0) {
                countdownElement.textContent = `${countdown} 秒后自动关闭`;
                progressFill.style.width = progress + '%';
            }
            
            if (countdown <= 0) {
                closeWindow();
            }
        }
        
        function closeWindow() {
            // 通知父窗口支付成功
            if (window.opener) {
                // 如果是通过window.open打开的窗口
                try {
                    window.opener.postMessage({
                        action: 'paymentSuccess',
                        message: '支付成功！会员已激活'
                    }, '*');
                } catch (e) {
                    console.log('无法通知父窗口:', e);
                }
                window.close();
            } else if (window.parent && window.parent !== window) {
                // 如果是在iframe中
                window.parent.postMessage({
                    action: 'paymentSuccess',
                    message: '支付成功！会员已激活'
                }, '*');
            } else {
                // 尝试通过localStorage通知同一域名的其他页面
                try {
                    localStorage.setItem('paymentSuccess', JSON.stringify({
                        timestamp: Date.now(),
                        message: '支付成功！会员已激活'
                    }));
                } catch (e) {
                    console.log('无法使用localStorage:', e);
                }
                
                // 尝试关闭整个标签页
                try {
                    window.open('', '_self', '');
                    window.close();
                } catch (e) {
                    console.log('无法关闭标签页:', e);
                }
            }
            
            // 如果以上方法都无效，显示提示信息
            setTimeout(() => {
                document.querySelector('.container').innerHTML = `
                    <div class="success-icon"></div>
                    <h1>支付成功！</h1>
                    <p>您的会员已成功激活</p>
                    <p style="color: #4CAF50; font-weight: 600;">请手动关闭此页面</p>
                    <p class="close-hint">如果页面没有自动关闭，请手动关闭浏览器标签页</p>
                `;
            }, 1000);
        }
        
        // 启动倒计时
        const interval = setInterval(updateCountdown, 1000);
        
        // 监听来自父窗口的消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'paymentSuccess') {
                // 如果收到支付成功的消息，也可以关闭
                setTimeout(closeWindow, 1000);
            }
        });
        
        // 页面加载完成后立即尝试关闭（某些浏览器允许）
        window.addEventListener('load', function() {
            // 给页面一点时间显示成功信息
            setTimeout(function() {
                // 尝试静默关闭
                if (window.opener && !window.opener.closed) {
                    try {
                        window.close();
                    } catch (e) {
                        console.log('无法自动关闭窗口，使用倒计时模式');
                    }
                }
            }, 1500);
        });
    </script>
</body>
</html>
