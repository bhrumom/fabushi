<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球法布施 - 忘记密码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-password-container {
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }

        .forgot-password-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
        }

        .forgot-password-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .forgot-password-subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: #66a6ff;
            box-shadow: 0 0 0 3px rgba(102, 166, 255, 0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px 0 rgba(118, 204, 252, 0.4);
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px 0 rgba(118, 204, 252, 0.6);
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(145deg, #95a5a6 0%, #7f8c8d 100%);
            box-shadow: 0 4px 15px 0 rgba(149, 165, 166, 0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 7px 20px 0 rgba(149, 165, 166, 0.6);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 8px;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 8px;
        }

        .back-link {
            color: #66a6ff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }

        .back-link:hover {
            color: #4a90e2;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <div class="forgot-password-card">
            <!-- 步骤1: 输入邮箱 -->
            <div id="step1" class="step active">
                <h1 class="forgot-password-title">🔐 忘记密码</h1>
                <p class="forgot-password-subtitle">请输入您的邮箱地址，我们将向您发送重置密码的链接</p>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label class="form-label" for="email">邮箱地址</label>
                        <input type="email" id="email" class="form-input" placeholder="请输入您的邮箱地址" required>
                    </div>
                    <button type="submit" class="btn" id="sendResetBtn">
                        <span id="sendResetText">发送重置链接</span>
                    </button>
                </form>
                
                <div class="back-link" onclick="goBack()">返回登录</div>
            </div>

            <!-- 步骤2: 发送成功 -->
            <div id="step2" class="step">
                <h1 class="forgot-password-title">📧 邮件已发送</h1>
                <p class="forgot-password-subtitle">
                    重置密码的链接已发送到您的邮箱<br>
                    <strong id="sentEmail"></strong><br><br>
                    请检查您的邮箱（包括垃圾邮件文件夹），点击链接重置密码
                </p>
                
                <button class="btn" onclick="resendEmail()">
                    <span id="resendText">重新发送</span>
                </button>
                
                <button class="btn btn-secondary" onclick="goBack()">返回登录</button>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script>
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const sendResetBtn = document.getElementById('sendResetBtn');
        const sendResetText = document.getElementById('sendResetText');
        const resendText = document.getElementById('resendText');
        const message = document.getElementById('message');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const sentEmail = document.getElementById('sentEmail');

        let currentEmail = '';

        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();

            if (!email) {
                showMessage('请输入邮箱地址', 'error');
                return;
            }

            if (!isValidEmail(email)) {
                showMessage('请输入有效的邮箱地址', 'error');
                return;
            }

            currentEmail = email;
            await sendResetEmail(email);
        });

        async function sendResetEmail(email) {
            sendResetBtn.disabled = true;
            sendResetText.innerHTML = '<span class="loading"></span> 发送中...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    sentEmail.textContent = email;
                    showStep2();
                    showMessage('重置链接已发送到您的邮箱', 'success');
                } else {
                    showMessage(data.error || '发送失败，请稍后重试', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                sendResetBtn.disabled = false;
                sendResetText.textContent = '发送重置链接';
            }
        }

        async function resendEmail() {
            const resendBtn = event.target;
            resendBtn.disabled = true;
            resendText.innerHTML = '<span class="loading"></span> 发送中...';

            try {
                await sendResetEmail(currentEmail);
            } finally {
                resendBtn.disabled = false;
                resendText.textContent = '重新发送';
            }
        }

        function showStep2() {
            step1.classList.remove('active');
            step2.classList.add('active');
        }

        function showMessage(msg, type) {
            message.innerHTML = `<div class="${type}-message">${msg}</div>`;
            setTimeout(() => {
                message.innerHTML = '';
            }, 5000);
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function goBack() {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
