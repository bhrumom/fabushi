<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锁屏通知测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(118, 204, 252, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(118, 204, 252, 0.6);
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.05);
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #89f7fe 0%, #66a6ff 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .instruction {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 锁屏通知测试</h1>
        
        <div class="instruction">
            <h3>📱 使用说明：</h3>
            <ol>
                <li>点击"请求通知权限"按钮</li>
                <li>在浏览器弹窗中选择"允许"</li>
                <li>点击"开始模拟发送"按钮</li>
                <li>🔒 <strong>锁屏或切换到其他应用</strong></li>
                <li>观察通知栏中的实时进度更新</li>
                <li>点击通知可以重新打开页面</li>
            </ol>
        </div>
        
        <div class="status">
            <h3>权限状态：</h3>
            <p id="permissionStatus">检查中...</p>
            <button class="btn" onclick="requestNotificationPermission()">请求通知权限</button>
        </div>
        
        <div class="status">
            <h3>模拟测试：</h3>
            <p id="testStatus">等待开始...</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <button class="btn" onclick="startSimulation()" id="startBtn">开始模拟发送</button>
            <button class="btn" onclick="stopSimulation()" id="stopBtn" disabled>停止测试</button>
        </div>
        
        <div class="status">
            <h3>📋 测试日志：</h3>
            <div id="log" style="max-height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px;"></div>
        </div>
    </div>
    
    <script>
        let currentNotification = null;
        let simulationInterval = null;
        let currentProgress = 0;
        let isRunning = false;
        
        // 检查通知权限
        function checkNotificationPermission() {
            if (!('Notification' in window)) {
                document.getElementById('permissionStatus').textContent = '❌ 此浏览器不支持通知功能';
                return;
            }
            
            const permission = Notification.permission;
            let statusText = '';
            let statusEmoji = '';
            
            switch (permission) {
                case 'granted':
                    statusText = '✅ 已获得通知权限';
                    statusEmoji = '✅';
                    break;
                case 'denied':
                    statusText = '❌ 通知权限被拒绝';
                    statusEmoji = '❌';
                    break;
                case 'default':
                    statusText = '⏳ 尚未请求通知权限';
                    statusEmoji = '⏳';
                    break;
            }
            
            document.getElementById('permissionStatus').textContent = statusText;
            addLog(`${statusEmoji} 权限检查完成：${statusText}`);
        }
        
        // 请求通知权限
        async function requestNotificationPermission() {
            if (!('Notification' in window)) {
                addLog('❌ 此浏览器不支持通知功能');
                return;
            }
            
            try {
                const permission = await Notification.requestPermission();
                addLog(`🔔 通知权限请求结果：${permission}`);
                checkNotificationPermission();
                
                if (permission === 'granted') {
                    // 显示测试通知
                    showTestNotification('🎉 通知权限获取成功！', '现在您可以在锁屏时看到发送进度了');
                }
            } catch (error) {
                addLog(`❌ 请求通知权限失败：${error.message}`);
            }
        }
        
        // 显示测试通知
        function showTestNotification(title, body) {
            if (Notification.permission !== 'granted') {
                addLog('⚠️ 无通知权限，无法显示通知');
                return;
            }
            
            try {
                const notification = new Notification(title, {
                    body: body,
                    icon: '/favicon.ico',
                    badge: '/favicon.ico',
                    tag: 'test-notification',
                    requireInteraction: false,
                    silent: true,
                    data: {
                        timestamp: Date.now()
                    }
                });
                
                notification.onclick = () => {
                    window.focus();
                    notification.close();
                    addLog('👆 用户点击了通知');
                };
                
                notification.onclose = () => {
                    addLog('🔔 通知已关闭');
                };
                
                addLog(`🔔 已显示通知：${title}`);
            } catch (error) {
                addLog(`❌ 显示通知失败：${error.message}`);
            }
        }
        
        // 显示或更新进度通知
        function showProgressNotification(progress, fileName) {
            if (Notification.permission !== 'granted') {
                return;
            }
            
            // 关闭之前的通知
            if (currentNotification) {
                currentNotification.close();
            }
            
            try {
                const title = '📤 全球法布施发送中...';
                const body = `正在发送: ${fileName}\n进度: ${progress.toFixed(1)}%`;
                
                currentNotification = new Notification(title, {
                    body: body,
                    icon: '/favicon.ico',
                    badge: '/favicon.ico',
                    tag: 'progress-notification',
                    requireInteraction: false,
                    silent: true,
                    renotify: true,
                    data: {
                        type: 'progress',
                        progress: progress,
                        fileName: fileName,
                        timestamp: Date.now()
                    },
                    actions: [
                        {
                            action: 'view',
                            title: '👁️ 查看进度'
                        },
                        {
                            action: 'stop',
                            title: '⏹️ 停止发送'
                        }
                    ]
                });
                
                currentNotification.onclick = () => {
                    window.focus();
                    addLog('👆 用户通过通知返回页面');
                };
                
            } catch (error) {
                addLog(`❌ 显示进度通知失败：${error.message}`);
            }
        }
        
        // 开始模拟发送
        function startSimulation() {
            if (Notification.permission !== 'granted') {
                alert('请先获取通知权限！');
                return;
            }
            
            isRunning = true;
            currentProgress = 0;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('testStatus').textContent = '🚀 模拟发送进行中...';
            
            addLog('🚀 开始模拟发送测试');
            addLog('💡 提示：现在可以锁屏或切换应用来测试通知功能');
            
            const files = ['般若波罗蜜多心经.txt', '金刚般若波罗蜜经.txt', '妙法莲华经.txt', '大悲咒.txt', '楞严咒.txt'];
            let currentFileIndex = 0;
            
            simulationInterval = setInterval(() => {
                if (!isRunning) return;
                
                currentProgress += Math.random() * 10 + 5; // 每次增加5-15%
                
                if (currentProgress >= 100) {
                    currentProgress = 100;
                    currentFileIndex++;
                    
                    if (currentFileIndex >= files.length) {
                        // 所有文件完成
                        stopSimulation();
                        showTestNotification('✅ 发送完成', `所有 ${files.length} 个文件已成功发送！`);
                        addLog('✅ 模拟发送完成');
                        return;
                    } else {
                        // 进入下一个文件
                        currentProgress = 0;
                        addLog(`📄 开始发送文件: ${files[currentFileIndex]}`);
                    }
                }
                
                const fileName = files[currentFileIndex] || '未知文件';
                const progressText = `${currentProgress.toFixed(1)}%`;
                
                // 更新页面进度
                document.getElementById('progressFill').style.width = `${currentProgress}%`;
                document.getElementById('testStatus').textContent = `📤 发送: ${fileName} (${progressText})`;
                
                // 更新通知
                showProgressNotification(currentProgress, fileName);
                
                addLog(`📊 ${fileName}: ${progressText}`);
            }, 2000); // 每2秒更新一次
        }
        
        // 停止模拟发送
        function stopSimulation() {
            isRunning = false;
            if (simulationInterval) {
                clearInterval(simulationInterval);
                simulationInterval = null;
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('testStatus').textContent = '⏹️ 测试已停止';
            
            // 关闭进度通知
            if (currentNotification) {
                currentNotification.close();
                currentNotification = null;
            }
            
            addLog('⏹️ 模拟发送已停止');
        }
        
        // 添加日志
        function addLog(message) {
            const log = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${timestamp}] ${message}`;
            log.appendChild(logEntry);
            log.scrollTop = log.scrollHeight;
        }
        
        // 页面加载时检查权限
        document.addEventListener('DOMContentLoaded', () => {
            checkNotificationPermission();
            addLog('🔔 锁屏通知测试页面已加载');
        });
        
        // 页面可见性变化检测
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                addLog('🔒 页面已隐藏（锁屏/切换应用）');
            } else {
                addLog('👁️ 页面重新可见');
            }
        });
    </script>
</body>
</html>
