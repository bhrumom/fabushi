<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球法布施 - 重置密码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-password-container {
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }

        .reset-password-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
        }

        .reset-password-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .reset-password-subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: #66a6ff;
            box-shadow: 0 0 0 3px rgba(102, 166, 255, 0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px 0 rgba(118, 204, 252, 0.4);
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px 0 rgba(118, 204, 252, 0.6);
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 8px;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 8px;
        }

        .back-link {
            color: #66a6ff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }

        .back-link:hover {
            color: #4a90e2;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-requirements {
            text-align: left;
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            padding: 10px;
            background: rgba(127, 140, 141, 0.1);
            border-radius: 8px;
        }

        .password-requirements ul {
            margin: 5px 0 0 20px;
        }

        .password-requirements li {
            margin: 2px 0;
        }

        .requirement-met {
            color: #27ae60;
        }

        .requirement-unmet {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="reset-password-container">
        <div class="reset-password-card">
            <h1 class="reset-password-title">🔑 重置密码</h1>
            <p class="reset-password-subtitle">请输入您的新密码</p>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">新密码</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="请输入新密码" required>
                    <div class="password-requirements">
                        <div>密码要求：</div>
                        <ul>
                            <li id="req-length" class="requirement-unmet">至少8个字符</li>
                            <li id="req-uppercase" class="requirement-unmet">包含大写字母</li>
                            <li id="req-lowercase" class="requirement-unmet">包含小写字母</li>
                            <li id="req-number" class="requirement-unmet">包含数字</li>
                        </ul>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入新密码" required>
                </div>
                
                <button type="submit" class="btn" id="resetBtn">
                    <span id="resetText">重置密码</span>
                </button>
            </form>
            
            <div class="back-link" onclick="goToLogin()">返回登录</div>
            <div id="message"></div>
        </div>
    </div>

    <script>
        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const resetBtn = document.getElementById('resetBtn');
        const resetText = document.getElementById('resetText');
        const message = document.getElementById('message');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        // 从URL获取重置token和email
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        const email = urlParams.get('email');

        // 检查token和email是否存在
        if (!resetToken || !email) {
            showMessage('无效的重置链接，请重新申请', 'error');
            setTimeout(() => {
                window.location.href = '/forgot-password.html';
            }, 3000);
        }

        // 密码强度检查
        newPasswordInput.addEventListener('input', checkPasswordRequirements);

        function checkPasswordRequirements() {
            const password = newPasswordInput.value;
            
            // 长度检查
            const lengthReq = document.getElementById('req-length');
            if (password.length >= 8) {
                lengthReq.className = 'requirement-met';
            } else {
                lengthReq.className = 'requirement-unmet';
            }
            
            // 大写字母检查
            const uppercaseReq = document.getElementById('req-uppercase');
            if (/[A-Z]/.test(password)) {
                uppercaseReq.className = 'requirement-met';
            } else {
                uppercaseReq.className = 'requirement-unmet';
            }
            
            // 小写字母检查
            const lowercaseReq = document.getElementById('req-lowercase');
            if (/[a-z]/.test(password)) {
                lowercaseReq.className = 'requirement-met';
            } else {
                lowercaseReq.className = 'requirement-unmet';
            }
            
            // 数字检查
            const numberReq = document.getElementById('req-number');
            if (/\d/.test(password)) {
                numberReq.className = 'requirement-met';
            } else {
                numberReq.className = 'requirement-unmet';
            }
        }

        function isPasswordValid(password) {
            return password.length >= 8 && 
                   /[A-Z]/.test(password) && 
                   /[a-z]/.test(password) && 
                   /\d/.test(password);
        }

        resetPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!newPassword || !confirmPassword) {
                showMessage('请填写所有字段', 'error');
                return;
            }

            if (!isPasswordValid(newPassword)) {
                showMessage('密码不符合要求，请检查密码强度', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            resetBtn.disabled = true;
            resetText.innerHTML = '<span class="loading"></span> 重置中...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        token: resetToken,
                        newPassword: newPassword 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('密码重置成功！正在跳转到登录页面...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showMessage(data.error || '重置失败，请稍后重试', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                resetBtn.disabled = false;
                resetText.textContent = '重置密码';
            }
        });

        function showMessage(msg, type) {
            message.innerHTML = `<div class="${type}-message">${msg}</div>`;
            setTimeout(() => {
                message.innerHTML = '';
            }, 5000);
        }

        function goToLogin() {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
