<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信登录功能测试 - 全球法布施</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            border-radius: 15px; 
            padding: 30px; 
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }
        .title { font-size: 2em; color: #2c3e50; margin-bottom: 20px; text-align: center; }
        .test-section { margin-bottom: 30px; }
        .test-title { font-size: 1.3em; color: #34495e; margin-bottom: 15px; }
        .btn { 
            background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%);
            color: white; border: none; padding: 12px 24px; border-radius: 25px;
            cursor: pointer; font-size: 16px; margin: 5px; text-decoration: none;
            display: inline-block; transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-wechat { background: linear-gradient(145deg, #1aad19 0%, #2dc653 100%); }
        .result { 
            background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; 
            padding: 15px; margin-top: 15px; font-family: monospace; 
            white-space: pre-wrap; max-height: 300px; overflow-y: auto;
        }
        .success { border-color: #28a745; background: #d4edda; }
        .error { border-color: #dc3545; background: #f8d7da; }
        .info { border-color: #17a2b8; background: #d1ecf1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">🧪 微信登录功能测试</h1>
            
            <div class="test-section">
                <h2 class="test-title">1. 环境检查</h2>
                <button class="btn" onclick="checkEnvironment()">检查环境配置</button>
                <div id="envResult" class="result" style="display: none;"></div>
            </div>

            <div class="test-section">
                <h2 class="test-title">2. 获取微信登录URL</h2>
                <button class="btn" onclick="getWechatLoginUrl()">获取微信登录链接</button>
                <div id="urlResult" class="result" style="display: none;"></div>
            </div>

            <div class="test-section">
                <h2 class="test-title">3. 模拟微信登录</h2>
                <p>在微信环境中访问以下链接进行测试：</p>
                <button class="btn btn-wechat" onclick="testWechatLogin()">测试微信登录</button>
                <div id="loginResult" class="result" style="display: none;"></div>
            </div>

            <div class="test-section">
                <h2 class="test-title">4. 用户信息检查</h2>
                <button class="btn" onclick="checkUserInfo()">检查当前用户信息</button>
                <div id="userResult" class="result" style="display: none;"></div>
            </div>

            <div class="test-section">
                <h2 class="test-title">5. 微信账号管理</h2>
                <a href="/wechat-settings.html" class="btn">微信账号管理</a>
                <a href="/login.html" class="btn">登录页面</a>
                <a href="/register.html" class="btn">注册页面</a>
            </div>
        </div>
    </div>

    <script>
        // 检查环境配置
        async function checkEnvironment() {
            const resultDiv = document.getElementById('envResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.textContent = '正在检查环境配置...';

            try {
                const response = await fetch('/api/auth/wechat/login-url');
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ 环境配置正常\n\n微信登录URL: ${data.authUrl}\nState: ${data.state}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ 环境配置错误\n\n错误信息: ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ 网络错误\n\n${error.message}`;
            }
        }

        // 获取微信登录URL
        async function getWechatLoginUrl() {
            const resultDiv = document.getElementById('urlResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.textContent = '正在获取微信登录URL...';

            try {
                const response = await fetch('/api/auth/wechat/login-url');
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ 获取成功\n\n授权URL: ${data.authUrl}\n\nState: ${data.state}\n\n请在微信中访问此URL进行测试`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ 获取失败\n\n错误信息: ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ 网络错误\n\n${error.message}`;
            }
        }

        // 测试微信登录
        function testWechatLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.textContent = '正在跳转到微信登录页面...';

            // 获取微信登录URL并跳转
            fetch('/api/auth/wechat/login-url')
                .then(response => response.json())
                .then(data => {
                    if (data.authUrl) {
                        window.location.href = data.authUrl;
                    } else {
                        resultDiv.className = 'result error';
                        resultDiv.textContent = `❌ 获取登录URL失败\n\n${data.error}`;
                    }
                })
                .catch(error => {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ 网络错误\n\n${error.message}`;
                });
        }

        // 检查用户信息
        async function checkUserInfo() {
            const resultDiv = document.getElementById('userResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.textContent = '正在检查用户信息...';

            const token = localStorage.getItem('authToken');
            if (!token) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ 未登录，请先登录';
                return;
            }

            try {
                const response = await fetch('/api/auth/user-info', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ 用户信息获取成功\n\n用户名: ${data.username}\n邮箱: ${data.email}\n微信绑定: ${data.wechatOpenid ? '已绑定' : '未绑定'}\n微信昵称: ${data.wechatNickname || '无'}\n绑定时间: ${data.wechatBoundAt || '无'}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ 获取用户信息失败\n\n错误信息: ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ 网络错误\n\n${error.message}`;
            }
        }

        // 页面加载时自动检查环境
        document.addEventListener('DOMContentLoaded', function() {
            console.log('微信登录测试页面加载完成');
        });
    </script>
</body>
</html>
