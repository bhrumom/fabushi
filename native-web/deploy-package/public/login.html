<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球法布施 - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
        }

        .login-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.2em;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: #66a6ff;
            box-shadow: 0 0 0 3px rgba(102, 166, 255, 0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px 0 rgba(118, 204, 252, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px 0 rgba(118, 204, 252, 0.6);
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 8px;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 8px;
        }

        .register-link {
            margin-top: 20px;
            color: #66a6ff;
            cursor: pointer;
            text-decoration: underline;
        }

        .register-link:hover {
            color: #4a90e2;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .forgot-password-link {
            margin-top: 15px;
            color: #66a6ff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }
        
        .forgot-password-link:hover {
            color: #4a90e2;
        }
        
        .link-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wechat-login-section {
            margin-top: 30px;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 20px 0;
            color: #7f8c8d;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            background: rgba(255, 255, 255, 0.9);
            padding: 0 15px;
            position: relative;
        }

        .btn-wechat {
            background: linear-gradient(145deg, #1aad19 0%, #2dc653 100%);
            box-shadow: 0 4px 15px 0 rgba(45, 198, 83, 0.4);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-wechat:hover {
            box-shadow: 0 7px 20px 0 rgba(45, 198, 83, 0.6);
        }

        .wechat-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">✨ 全球法布施 ✨</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    <span id="loginText">登录</span>
                </button>
                <div id="loginMessage"></div>
            </form>
            
            <!-- 微信登录按钮 -->
            <div class="wechat-login-section">
                <div class="divider">
                    <span>或</span>
                </div>
                <button class="btn btn-wechat" id="wechatLoginBtn" onclick="wechatLogin()">
                    <span class="wechat-icon">📱</span>
                    微信登录
                </button>
            </div>
            
            <div class="link-container">
                <div class="forgot-password-link" onclick="showForgotPassword()">忘记密码？</div>
                <div class="register-link" onclick="showRegister()">没有账号？立即注册</div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const loginMessage = document.getElementById('loginMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginText.innerHTML = '<span class="loading"></span> 登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 保存token到本地存储
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: data.userId,
                        username: data.username,
                        email: data.email
                    }));
                    
                    showMessage('登录成功！正在跳转...', 'success');
                    
                    // 检查是否有重定向参数
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    
                    setTimeout(() => {
                        if (redirect) {
                            window.location.href = '/' + redirect;
                        } else {
                            window.location.href = '/index.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.error || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                loginBtn.disabled = false;
                loginText.textContent = '登录';
            }
        });

        function showMessage(message, type) {
            loginMessage.innerHTML = `<div class="${type}-message">${message}</div>`;
            setTimeout(() => {
                loginMessage.innerHTML = '';
            }, 5000);
        }

        function showRegister() {
            window.location.href = '/register.html';
        }

        function showForgotPassword() {
            window.location.href = '/forgot-password.html';
        }

        // 微信登录功能
        async function wechatLogin() {
            const wechatBtn = document.getElementById('wechatLoginBtn');
            const originalText = wechatBtn.innerHTML;
            
            try {
                wechatBtn.disabled = true;
                wechatBtn.innerHTML = '<span class="loading"></span> 获取登录链接...';
                
                // 获取微信登录URL
                const response = await fetch('/api/auth/wechat/login-url', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 跳转到微信授权页面
                    window.location.href = data.authUrl;
                } else {
                    showMessage(data.error || '获取微信登录链接失败', 'error');
                    wechatBtn.disabled = false;
                    wechatBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('微信登录失败:', error);
                showMessage('网络错误，请稍后重试', 'error');
                wechatBtn.disabled = false;
                wechatBtn.innerHTML = originalText;
            }
        }

        // 检查是否已登录
        window.addEventListener('load', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                // 验证token有效性
                fetch('/api/auth/verify', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                }).then(response => {
                    if (response.ok) {
                        window.location.href = '/index.html';
                    } else {
                        localStorage.removeItem('authToken');
                        localStorage.removeItem('username');
                    }
                });
            }
        });
    </script>
</body>
</html>
