<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锁屏通知修复测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(118, 204, 252, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(118, 204, 252, 0.6);
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.05);
        }
        
        .log {
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .instruction {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #856404;
        }
        
        .success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #155724;
        }
        
        .error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 锁屏通知修复测试</h1>
        
        <div class="instruction">
            <h3>🎯 测试目标：</h3>
            <p>验证切换应用或锁屏时是否能正常显示发送进度通知</p>
        </div>
        
        <div class="status">
            <h3>修复状态：</h3>
            <p id="fixStatus">准备中...</p>
            <button class="btn" onclick="runFix()">🔧 运行修复</button>
        </div>
        
        <div class="status">
            <h3>通知测试：</h3>
            <p id="notificationStatus">等待修复完成...</p>
            <button class="btn" onclick="testNotification()" id="testBtn" disabled>🧪 测试通知</button>
            <button class="btn" onclick="simulateProgress()" id="progressBtn" disabled>📊 模拟进度</button>
        </div>
        
        <div class="status">
            <h3>🔒 锁屏测试步骤：</h3>
            <ol>
                <li>点击"运行修复"按钮</li>
                <li>确保通知权限已授予</li>
                <li>点击"模拟进度"开始模拟发送</li>
                <li><strong>锁屏或切换到其他应用</strong></li>
                <li>观察通知栏是否显示进度更新</li>
                <li>点击通知验证是否能返回页面</li>
            </ol>
        </div>
        
        <div class="log" id="log"></div>
    </div>
    
    <script src="fix-notification-issue.js"></script>
    <script>
        let simulationInterval = null;
        let currentProgress = 0;
        
        // 添加日志
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.style.color = type === 'error' ? '#dc3545' : 
                                  type === 'success' ? '#28a745' : '#333';
            logEntry.textContent = `[${timestamp}] ${message}`;
            log.appendChild(logEntry);
            log.scrollTop = log.scrollHeight;
        }
        
        // 运行修复
        async function runFix() {
            try {
                document.getElementById('fixStatus').textContent = '正在运行修复...';
                addLog('🔧 开始运行通知修复...');
                
                const success = await window.notificationFixer.init();
                
                if (success) {
                    document.getElementById('fixStatus').textContent = '✅ 修复完成';
                    document.getElementById('fixStatus').className = 'success';
                    document.getElementById('notificationStatus').textContent = '✅ 可以开始测试';
                    document.getElementById('testBtn').disabled = false;
                    document.getElementById('progressBtn').disabled = false;
                    addLog('✅ 通知修复成功完成', 'success');
                } else {
                    throw new Error('修复失败');
                }
            } catch (error) {
                document.getElementById('fixStatus').textContent = '❌ 修复失败: ' + error.message;
                document.getElementById('fixStatus').className = 'error';
                addLog('❌ 修复失败: ' + error.message, 'error');
            }
        }
        
        // 测试通知
        async function testNotification() {
            try {
                addLog('🧪 开始测试通知...');
                const success = await window.notificationFixer.testNotification();
                
                if (success) {
                    addLog('✅ 测试通知已发送', 'success');
                    document.getElementById('notificationStatus').textContent = '✅ 测试通知已发送，请检查通知栏';
                } else {
                    addLog('❌ 测试通知发送失败', 'error');
                }
            } catch (error) {
                addLog('❌ 测试通知出错: ' + error.message, 'error');
            }
        }
        
        // 模拟进度
        function simulateProgress() {
            if (simulationInterval) {
                // 停止模拟
                clearInterval(simulationInterval);
                simulationInterval = null;
                document.getElementById('progressBtn').textContent = '📊 模拟进度';
                addLog('⏹️ 进度模拟已停止');
                return;
            }
            
            // 开始模拟
            currentProgress = 0;
            document.getElementById('progressBtn').textContent = '⏹️ 停止模拟';
            addLog('🚀 开始模拟发送进度...');
            addLog('💡 现在可以锁屏或切换应用测试通知功能');
            
            const files = ['般若波罗蜜多心经.txt', '金刚般若波罗蜜经.txt', '妙法莲华经.txt'];
            let currentFileIndex = 0;
            
            simulationInterval = setInterval(() => {
                currentProgress += Math.random() * 15 + 5; // 每次增加5-20%
                
                if (currentProgress >= 100) {
                    currentProgress = 100;
                    currentFileIndex++;
                    
                    if (currentFileIndex >= files.length) {
                        // 完成
                        clearInterval(simulationInterval);
                        simulationInterval = null;
                        document.getElementById('progressBtn').textContent = '📊 模拟进度';
                        addLog('✅ 模拟发送完成', 'success');
                        
                        // 发送完成通知
                        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                            navigator.serviceWorker.controller.postMessage({
                                type: 'TEST_NOTIFICATION',
                                payload: {
                                    title: '✅ 模拟发送完成',
                                    body: `所有 ${files.length} 个文件已成功发送！`,
                                    progress: 100,
                                    fileName: '发送完成'
                                }
                            });
                        }
                        return;
                    } else {
                        // 下一个文件
                        currentProgress = 0;
                        addLog(`📄 开始发送: ${files[currentFileIndex]}`);
                    }
                }
                
                const fileName = files[currentFileIndex];
                addLog(`📊 ${fileName}: ${currentProgress.toFixed(1)}%`);
                
                // 发送进度更新到Service Worker
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'FORCE_NOTIFICATION_UPDATE',
                        payload: {
                            currentFile: fileName,
                            completedFiles: currentFileIndex,
                            totalFiles: files.length,
                            progress: currentProgress
                        }
                    });
                }
            }, 2000);
        }
        
        // 页面可见性变化监听
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                addLog('🔒 页面已隐藏（锁屏/切换应用）- 测试通知功能');
            } else {
                addLog('👁️ 页面重新可见');
            }
        });
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', () => {
            addLog('🔧 通知修复测试页面已加载');
            addLog('💡 点击"运行修复"开始测试');
        });
    </script>
</body>
</html>
