<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完善资料 / 绑定邮箱 - 全球法布施</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 30px; box-shadow: 0 8px 32px rgba(31,38,135,0.15); width: 100%; max-width: 460px; }
    h1 { font-family: 'Noto Serif SC', serif; font-size: 1.8em; color: #2c3e50; margin-bottom: 10px; text-align: center; }
    p.sub { color: #7f8c8d; text-align: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 8px; color: #34495e; font-weight: 600; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; background: rgba(255,255,255,0.85); }
    .form-input:focus { outline: none; border-color: #66a6ff; box-shadow: 0 0 0 3px rgba(102,166,255,0.1); }
    .row { display: flex; gap: 10px; }
    .row .form-input { flex: 1; }
    .btn { width: 100%; background: linear-gradient(145deg, #89f7fe 0%, #66a6ff 100%); color: #fff; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 15px rgba(118,204,252,0.4); transition: all .3s ease; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(118,204,252,0.6); }
    .btn:disabled { background: #bdc3c7; box-shadow: none; transform: none; cursor: not-allowed; }
    .btn-secondary { background: linear-gradient(145deg, #1aad19 0%, #2dc653 100%); box-shadow: 0 4px 15px rgba(45,198,83,0.4); }
    .message { margin-top: 12px; padding: 10px; border-radius: 10px; text-align: center; font-size: 14px; }
    .error { background: rgba(231,76,60,0.1); color: #e74c3c; }
    .success { background: rgba(39,174,96,0.1); color: #27ae60; }
    .loading { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s ease infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .link { display: block; margin-top: 10px; text-align: center; color: #66a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>完善资料 / 绑定邮箱</h1>
    <p class="sub">添加邮箱用于找回密码与通知，确保账号安全</p>

    <div class="form-group">
      <label class="form-label" for="email">邮箱</label>
      <input class="form-input" type="email" id="email" placeholder="请输入邮箱">
    </div>

    <div class="form-group">
      <label class="form-label" for="code">验证码</label>
      <div class="row">
        <input class="form-input" type="text" id="code" placeholder="6位验证码" maxlength="6">
        <button class="btn" id="sendBtn" onclick="sendCode()">发送验证码</button>
      </div>
    </div>

    <button class="btn btn-secondary" id="bindBtn" onclick="bindEmail()">绑定邮箱</button>
    <div id="msg" class="message" style="display:none;"></div>

    <a class="link" href="/index.html">返回首页</a>
  </div>

  <script>
    let cooldown = 0; let timer = null;

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text; el.className = 'message ' + (type || ''); el.style.display = 'block';
      if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function startCooldown(seconds) {
      cooldown = seconds; const btn = document.getElementById('sendBtn');
      btn.disabled = true; btn.textContent = cooldown + '秒后重发';
      timer = setInterval(() => {
        cooldown--; btn.textContent = cooldown + '秒后重发';
        if (cooldown <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '发送验证码'; }
      }, 1000);
    }

    async function sendCode() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      if (!email) { showMsg('请先输入邮箱', 'error'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg('邮箱格式不正确', 'error'); return; }
      try {
        const resp = await fetch('/api/auth/send-verification-code', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, type: 'register' })
        });
        const data = await resp.json();
        if (resp.ok) { showMsg('验证码已发送，请查收邮箱', 'success'); startCooldown(60); }
        else { showMsg(data.error || '发送失败', 'error'); }
      } catch (e) {
        showMsg('网络错误，请稍后再试', 'error');
      }
    }

    async function bindEmail() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const code = document.getElementById('code').value.trim();
      const btn = document.getElementById('bindBtn');
      if (!email || !code) { showMsg('邮箱与验证码不能为空', 'error'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg('邮箱格式不正确', 'error'); return; }
      if (!/^\d{6}$/.test(code)) { showMsg('验证码为6位数字', 'error'); return; }
      try {
        btn.disabled = true; btn.innerHTML = '<span class="loading"></span> 绑定中...';
        const resp = await fetch('/api/auth/bind-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('authToken')||'') },
          body: JSON.stringify({ email, verificationCode: code })
        });
        const data = await resp.json();
        if (resp.ok) { showMsg('绑定成功：' + data.email, 'success'); }
        else { showMsg(data.error || '绑定失败', 'error'); }
      } catch (e) {
        showMsg('网络错误，请稍后再试', 'error');
      } finally {
        btn.disabled = false; btn.textContent = '绑定邮箱';
      }
    }

    // 预填邮箱（若从回调页带参而来）
    (function(){
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      if (email) document.getElementById('email').value = email;
    })();
  </script>
</body>
</html>
