<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球法布施 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-form {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            margin: 30px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 14px;
            position: relative;
        }

        .alipay-login {
            background: #1677ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .alipay-login:hover {
            background: #1364d9;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1677ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">法</div>
        <h1>全球法布施</h1>
        <p class="subtitle">传播佛法，利益众生</p>

        <div id="message-container"></div>

        <div id="login-form-container">
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>

            <div class="divider">
                <span>或使用</span>
            </div>

            <button type="button" class="alipay-login" id="alipayLoginBtn">
                <svg width="20" height="20" viewBox="0 0 1024 1024" fill="currentColor">
                    <path d="M1023.795 0H0v1024h1023.795V0z m-138.862 131.512h-82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816h-82.842z m-165.797-111.304h-82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816h-82.842z m-165.797-111.304h-82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816h-82.842z m-165.797-111.304H82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816H82.842z"/>
                </svg>
                支付宝登录
            </button>
        </div>

        <div id="loading-container" class="hidden">
            <div style="text-align: center; padding: 40px;">
                <div class="loading"></div>
                <p style="margin-top: 20px; color: #666;">正在处理登录...</p>
            </div>
        </div>

        <div class="footer">
            <p>全球法布施平台</p>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                token: params.get('token'),
                username: params.get('username'),
                error: params.get('error'),
                alipay_auth_code: params.get('alipay_auth_code'),
                alipay_user_id: params.get('alipay_user_id'),
                alipay_nickname: params.get('alipay_nickname'),
                alipay_avatar: params.get('alipay_avatar'),
                needs_binding: params.get('needs_binding')
            };
        }

        // 显示消息
        function showMessage(message, type = 'error') {
            const container = document.getElementById('message-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            // 5秒后自动隐藏
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // 支付宝登录回调处理已迁移到Flutter应用，此页面不再作为桥接使用
        function handleAlipayCallback() {
            // 直接跳转到Flutter应用主页面
            window.location.href = '/index.html';
        }

        // 显示绑定表单
        function showBindingForm(alipayData) {
            const formContainer = document.getElementById('login-form-container');
            formContainer.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #333;">绑定账号</h3>
                <div style="display: flex; align-items: center; margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                    <img src="${alipayData.alipay_avatar}" alt="头像" style="width: 50px; height: 50px; border-radius: 50%; margin-right: 15px;">
                    <div style="text-align: left;">
                        <div style="font-weight: 500; color: #333;">${alipayData.alipay_nickname}</div>
                        <div style="font-size: 12px; color: #999;">支付宝用户ID: ${alipayData.alipay_user_id}</div>
                    </div>
                </div>
                <form class="login-form" id="bindingForm">
                    <div class="form-group">
                        <label for="bindEmail">邮箱</label>
                        <input type="email" id="bindEmail" name="email" required placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label for="bindPassword">密码</label>
                        <input type="password" id="bindPassword" name="password" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="login-btn">绑定并登录</button>
                </form>
                <div style="text-align: center; margin-top: 15px;">
                    <p style="color: #666; font-size: 14px; margin-bottom: 10px;">还没有账号？</p>
                    <button type="button" class="alipay-login" onclick="showRegisterForm()" style="margin-bottom: 10px;">
                        注册新账号
                    </button>
                    <button type="button" class="alipay-login" onclick="handleSkipBinding()" style="background-color: #f5f5f5; color: #666;">
                        跳过绑定，以后再说
                    </button>
                </div>
            `;

            document.getElementById('bindingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleBinding(alipayData);
            });
        }

        // 处理绑定
        async function handleBinding(alipayData) {
            const email = document.getElementById('bindEmail').value;
            const password = document.getElementById('bindPassword').value;

            showLoading();

            try {
                const response = await fetch('/api/auth/alipay/bind', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        alipayUserId: alipayData.alipay_user_id,
                        email: email,
                        password: password,
                        nickname: alipayData.alipay_nickname,
                        avatar: alipayData.alipay_avatar
                    })
                });

                const result = await response.json();

                if (response.ok && result.token) {
                    // 绑定成功，保存token并跳转
                    // 使用与Flutter应用相同的键名存储token
                    localStorage.setItem('auth_token', result.token);
                    localStorage.setItem('username', result.username);
                    showMessage('绑定成功！', 'success');
                    setTimeout(() => {
                        // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                        window.location.href = `/index.html#token=${result.token}&username=${result.username}`;
                    }, 1500);
                } else {
                    // 绑定失败，显示具体错误信息
                    let errorMsg = '绑定失败';
                    if (result.error) {
                        errorMsg = result.error;
                    } else if (result.message) {
                        errorMsg = result.message;
                    }
                    
                    // 根据错误类型给出建议
                    if (errorMsg.includes('邮箱未注册')) {
                        errorMsg += '，请先注册账号或使用已有账号登录';
                    } else if (errorMsg.includes('密码错误')) {
                        errorMsg += '，请检查密码是否正确';
                    } else if (errorMsg.includes('已绑定')) {
                        errorMsg += '，请使用其他账号登录';
                    }
                    
                    showMessage(errorMsg, 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            } finally {
                hideLoading();
            }
        }

        // 显示登录表单
        function showLoginForm() {
            location.reload(); // 重新加载页面显示默认登录界面
        }
        
        // 显示注册表单
        function showRegisterForm() {
            const loginContainer = document.querySelector('.login-container');
            loginContainer.innerHTML = `
                <div class="logo">法</div>
                <h1>全球法布施</h1>
                <p class="subtitle">注册新账号</p>
                <div id="message-container"></div>
                <div class="login-form">
                    <form id="register-form">
                        <div class="form-group">
                            <label for="register-username">用户名</label>
                            <input type="text" id="register-username" name="username" required placeholder="请输入用户名">
                        </div>
                        <div class="form-group">
                            <label for="register-email">邮箱</label>
                            <input type="email" id="register-email" name="email" required placeholder="请输入邮箱">
                        </div>
                        <div class="form-group">
                            <label for="register-password">密码</label>
                            <input type="password" id="register-password" name="password" required placeholder="请输入密码（至少6位）" minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="register-confirm-password">确认密码</label>
                            <input type="password" id="register-confirm-password" name="confirmPassword" required placeholder="请再次输入密码">
                        </div>
                        <button type="submit" class="login-btn">注册</button>
                    </form>
                    <div style="text-align: center; margin-top: 15px;">
                        <p style="color: #666; font-size: 14px; margin-bottom: 10px;">已有账号？</p>
                        <button type="button" class="alipay-login" onclick="showLoginForm()" style="background-color: #f5f5f5; color: #666;">
                            返回登录
                        </button>
                    </div>
                </div>
                <div class="footer">
                    <p>全球法布施平台</p>
                </div>
            `;
            
            // 如果有支付宝用户信息，自动填充邮箱
            if (window.alipayUserInfo && window.alipayUserInfo.email) {
                document.getElementById('register-email').value = window.alipayUserInfo.email;
            }

            // 绑定注册表单提交事件
            document.getElementById('register-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('register-username').value;
                const email = document.getElementById('register-email').value;
                const password = document.getElementById('register-password').value;
                const confirmPassword = document.getElementById('register-confirm-password').value;
                
                // 验证密码匹配
                if (password !== confirmPassword) {
                    showMessage('两次输入的密码不一致', 'error');
                    return;
                }
                
                showLoading();
                
                try {
                    // 先发送验证码
                const sendCodeResponse = await fetch('/api/auth/send-verification-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                if (!sendCodeResponse.ok) {
                    showMessage('发送验证码失败', 'error');
                    return;
                }
                
                // 显示验证码输入框
                const verificationCode = prompt('验证码已发送到您的邮箱，请输入验证码：');
                if (!verificationCode) {
                    showMessage('请输入验证码', 'error');
                    return;
                }
                
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        verificationCode
                    })
                });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        // 注册成功后自动登录
                        // 使用与Flutter应用相同的键名存储token
                        localStorage.setItem('auth_token', result.token);
                        localStorage.setItem('username', result.username);
                        
                        // 如果有支付宝用户信息，尝试绑定
                        if (window.alipayUserInfo) {
                            try {
                                const bindResponse = await fetch('/api/auth/alipay/bind', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${result.token}`
                                    },
                                    body: JSON.stringify({
                                        alipay_user_id: window.alipayUserInfo.user_id,
                                        alipay_open_id: window.alipayUserInfo.open_id
                                    })
                                });
                                
                                const bindResult = await bindResponse.json();
                                if (bindResponse.ok) {
                                    showMessage('注册成功！支付宝账号已绑定，正在跳转...', 'success');
                                } else {
                                    showMessage('注册成功！但支付宝绑定失败：' + (bindResult.message || '未知错误') + '，正在跳转...', 'warning');
                                }
                            } catch (bindError) {
                                console.error('支付宝绑定失败:', bindError);
                                showMessage('注册成功！但支付宝绑定失败，正在跳转...', 'warning');
                            }
                        } else {
                            showMessage('注册成功！正在跳转...', 'success');
                        }
                        
                        setTimeout(() => {
                            // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                            window.location.href = `/index.html#token=${result.token}&username=${result.username}`;
                        }, 2000);
                    } else {
                        showMessage(result.message || '注册失败', 'error');
                    }
                } catch (error) {
                    showMessage('网络错误，请重试', 'error');
                } finally {
                    hideLoading();
                }
            });
        }

        // 处理跳过绑定
        function handleSkipBinding() {
            showMessage('您可以选择使用传统方式登录，或关闭页面后重新使用支付宝登录', 'info');
            // 显示传统登录表单，让用户选择其他登录方式
            const formContainer = document.getElementById('login-form-container');
            formContainer.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #333;">选择登录方式</h3>
                <div style="margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                    <p style="color: #666; margin-bottom: 15px;">您可以选择以下方式继续：</p>
                    <button type="button" class="alipay-login" onclick="location.reload()" style="margin-bottom: 10px; width: 100%;">
                        重新使用支付宝登录
                    </button>
                    <button type="button" class="alipay-login" onclick="handleGuestAccess()" style="margin-bottom: 10px; width: 100%; background: #52c41a;">
                        游客模式体验
                    </button>
                    <button type="button" class="alipay-login" onclick="showRegisterForm()" style="margin-bottom: 10px; width: 100%; background: #fa8c16;">
                        注册新账号
                    </button>
                </div>
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" required placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                </form>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="/register.html" style="color: #1890ff;">还没有账号？立即注册</a>
                </div>
            `;

            // 重新绑定传统登录表单事件
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await handleTraditionalLogin(email, password);
            });
        }

        // 处理游客模式访问
        function handleGuestAccess() {
            // 创建游客模式的临时token
            const guestToken = 'guest_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const guestUsername = '游客_' + Math.random().toString(36).substr(2, 6);
            
            // 保存游客信息到localStorage
            // 使用与Flutter应用相同的键名存储token
            localStorage.setItem('auth_token', guestToken);
            localStorage.setItem('username', guestUsername);
            localStorage.setItem('isGuest', 'true');
            localStorage.setItem('guestLoginTime', new Date().toISOString());
            
            showMessage('游客模式登录成功！部分功能可能受限', 'success');
            setTimeout(() => {
                // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                window.location.href = `/index.html#token=${guestToken}&username=${guestUsername}`;
            }, 1500);
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('loading-container').classList.remove('hidden');
            document.getElementById('login-form-container').classList.add('hidden');
        }

        // 隐藏加载状态
        function hideLoading() {
            document.getElementById('loading-container').classList.add('hidden');
            document.getElementById('login-form-container').classList.remove('hidden');
        }

        // 处理传统登录
        async function handleTraditionalLogin(email, password) {
            showLoading();

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // 使用与Flutter应用相同的键名存储token
                    localStorage.setItem('auth_token', result.token);
                    localStorage.setItem('username', result.username);
                    showMessage('登录成功！', 'success');
                    setTimeout(() => {
                        // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                        window.location.href = `/index.html#token=${result.token}&username=${result.username}`;
                    }, 1500);
                } else {
                    showMessage(result.message || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            } finally {
                hideLoading();
            }
        }

        // 处理支付宝登录（在应用内完成，不跳转到外部页面）
        async function handleAlipayLogin() {
            try {
                showLoading();
                
                const response = await fetch('/api/auth/alipay/login-url', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const result = await response.json();

                if (result.authUrl) {
                    // 显示二维码让用户扫码登录，而不是直接跳转
                    showAlipayQRCode(result.authUrl, result.state);
                } else {
                    showMessage('支付宝登录初始化失败', 'error');
                    hideLoading();
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
                hideLoading();
            }
        }

        // 显示支付宝登录二维码
        function showAlipayQRCode(authUrl, state) {
            hideLoading();
            
            const formContainer = document.getElementById('login-form-container');
            formContainer.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <h3 style="margin-bottom: 20px; color: #333;">支付宝扫码登录</h3>
                    <div style="margin: 20px 0;">
                        <div id="alipay-qr-code" style="display: inline-block; padding: 20px; border: 2px solid #ddd; border-radius: 8px;">
                            <p style="color: #666; margin-bottom: 15px;">正在生成登录二维码...</p>
                        </div>
                    </div>
                    <p style="color: #999; font-size: 14px; margin-bottom: 20px;">
                        请使用支付宝扫描二维码登录
                    </p>
                    <button type="button" class="alipay-login" onclick="cancelAlipayLogin()" style="background: #ccc;">
                        取消登录
                    </button>
                </div>
            `;
            
            // 生成二维码
            generateQRCode(authUrl, 'alipay-qr-code');
            
            // 开始轮询登录状态
            startPollingLoginState(state);
        }

        // 生成二维码
        function generateQRCode(text, containerId) {
            const container = document.getElementById(containerId);
            
            // 使用简单的二维码生成算法
            const qrSize = 200;
            const qrDiv = document.createElement('div');
            qrDiv.style.width = qrSize + 'px';
            qrDiv.style.height = qrSize + 'px';
            qrDiv.style.border = '1px solid #000';
            qrDiv.style.display = 'grid';
            qrDiv.style.gridTemplateColumns = `repeat(${Math.sqrt(text.length)}, 1fr)`;
            qrDiv.style.gap = '1px';
            qrDiv.style.background = '#fff';
            
            // 简单的模拟二维码模式
            for (let i = 0; i < text.length; i++) {
                const cell = document.createElement('div');
                cell.style.background = text.charCodeAt(i) % 2 === 0 ? '#000' : '#fff';
                qrDiv.appendChild(cell);
            }
            
            container.innerHTML = '';
            container.appendChild(qrDiv);
            
            // 同时显示链接（便于调试）
            const linkDiv = document.createElement('div');
            linkDiv.style.marginTop = '10px';
            linkDiv.style.fontSize = '12px';
            linkDiv.style.color = '#666';
            linkDiv.innerHTML = `<small>或直接访问：<br>${text}</small>`;
            container.appendChild(linkDiv);
        }

        // 开始轮询登录状态
        function startPollingLoginState(state) {
            let pollCount = 0;
            const maxPolls = 60; // 最多轮询60次，约3分钟
            
            const pollInterval = setInterval(async () => {
                pollCount++;
                
                if (pollCount >= maxPolls) {
                    clearInterval(pollInterval);
                    showMessage('登录超时，请重新尝试', 'error');
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                    return;
                }
                
                try {
                    // 检查是否有登录成功的回调参数（URL被重写了）
                    const urlParams = new URLSearchParams(window.location.search);
                    const alipayLoginSuccess = urlParams.get('alipay_login_success');
                    const token = urlParams.get('token');
                    const username = urlParams.get('username');
                    
                    if (alipayLoginSuccess === 'true' && token && username) {
                        clearInterval(pollInterval);
                        // 直接完成登录，不再处理回调
                        completeAlipayLogin(token, username);
                        return;
                    }
                    
                    // 检查是否有绑定需求
                    const needsBinding = urlParams.get('needs_binding');
                    if (needsBinding === 'true') {
                        clearInterval(pollInterval);
                        handleAlipayCallback(); // 处理绑定逻辑
                        return;
                    }
                    
                    // 检查是否有错误
                    const error = urlParams.get('error');
                    if (error) {
                        clearInterval(pollInterval);
                        handleAlipayCallback(); // 处理错误
                        return;
                    }
                    
                } catch (error) {
                    console.error('轮询登录状态失败:', error);
                }
            }, 3000); // 每3秒检查一次
            
            // 保存轮询句柄，便于取消
            window.alipayPollInterval = pollInterval;
        }

        // 取消支付宝登录
        function cancelAlipayLogin() {
            if (window.alipayPollInterval) {
                clearInterval(window.alipayPollInterval);
                delete window.alipayPollInterval;
            }
            location.reload();
        }

        // 完成支付宝登录
        function completeAlipayLogin(token, username) {
            // 使用与Flutter应用相同的键名存储token
            localStorage.setItem('auth_token', token);
            localStorage.setItem('username', username);
            showMessage('支付宝登录成功！', 'success');
            setTimeout(() => {
                // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                window.location.href = `/index.html#token=${token}&username=${username}`;
            }, 1500);
        }

        // 事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            // 处理支付宝回调
            handleAlipayCallback();

            // 传统登录表单提交（只有当表单存在时才绑定）
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    await handleTraditionalLogin(email, password);
                });
            }

            // 支付宝登录按钮（只有当按钮存在时才绑定）
            const alipayLoginBtn = document.getElementById('alipayLoginBtn');
            if (alipayLoginBtn) {
                alipayLoginBtn.addEventListener('click', handleAlipayLogin);
            }
        });
    </script>
</body>
</html>
