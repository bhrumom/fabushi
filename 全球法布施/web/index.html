<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="全球法布施 - 让佛法传遍世界每个角落">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="全球法布施">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>全球法布施</title>
  <link rel="manifest" href="manifest.json">

  <!-- 预加载关键资源 -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">

  <!-- 加载动画样式 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: opacity 0.5s ease-out;
    }

    .loading-content {
      text-align: center;
      color: white;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .loading-subtext {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .loading-progress {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto;
    }

    .loading-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ffffff, #f0f0f0);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
      animation: progress-animation 3s ease-in-out infinite;
    }

    @keyframes progress-animation {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    .fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .app-container {
      width: 100%;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }

    .app-container.show {
      opacity: 1;
    }
  </style>

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>
</head>
<body>
  <!-- 加载动画 -->
  <div id="loading-container" class="loading-container">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">全球法布施</div>
      <div class="loading-subtext">正在加载应用...</div>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- Flutter应用容器 -->
  <div id="app-container" class="app-container">
    <!-- Flutter应用将在这里渲染 -->
  </div>

  <!-- 加载优化器（必须在flutter_bootstrap之前加载） -->
  <script src="flutter-loading-optimizer.js"></script>
  
  <!-- Flutter引导脚本 -->
  <script src="flutter_bootstrap.js" defer></script>
  
  <script>
    // 页面加载完成后的初始化
    document.addEventListener('DOMContentLoaded', function() {
      console.log('🌟 全球法布施Web应用初始化开始');
    });
  </script>
</body>
</html>
