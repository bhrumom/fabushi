name = "fabushi-flutter-web"
main = "worker.js"
compatibility_date = "2024-08-01"

# KV存储配置 - 复用后端的KV存储
[[kv_namespaces]]
binding = "USERS_KV"
id = "20bc68276a0345ab9b5cbf17c1bd51c5"
preview_id = "6b219f4753b944f4a74043f385497c3b"

# 支付宝订单KV存储
[[kv_namespaces]]
binding = "ORDERS_KV"
id = "94534f35a0a34023a428a065f77f1911"
preview_id = "preview_orders_kv"

# 支付宝会员KV存储
[[kv_namespaces]]
binding = "MEMBERSHIP_KV"
id = "773e778850ea429d99686ff4fbbe1180"
preview_id = "preview_membership_kv"

# 兑换码KV存储
[[kv_namespaces]]
binding = "REDEEM_CODES_KV"
id = "59c5263942b4436191e6dffbaacc5957"
preview_id = "preview_redeem_codes_kv"

# R2存储配置
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "bushi"
preview_bucket_name = "bushi"

# Email Workers配置
[[send_email]]
name = "EMAIL"
destination_address = "131551832@qq.com"

# 环境变量
[vars]
FROM_EMAIL = "amitabha@ombhrum.com"
JWT_SECRET = "please_set_from_secret_in_production"
FLUTTER_WEB = "true"

# 默认环境资源绑定
[assets]
binding = "ASSETS"
directory = "/Users/gloriachan/Documents/全球发送/全球法布施/build/web"

# 生产环境配置
[env.production]
name = "fabushi-flutter-web-prod"
routes = [
  { pattern = "flutter.ombhrum.com/*", zone_name = "ombhrum.com" }
]
workers_dev = false

[[env.production.kv_namespaces]]
binding = "USERS_KV"
id = "20bc68276a0345ab9b5cbf17c1bd51c5"

[[env.production.kv_namespaces]]
binding = "ORDERS_KV"
id = "94534f35a0a34023a428a065f77f1911"

[[env.production.kv_namespaces]]
binding = "MEMBERSHIP_KV"
id = "773e778850ea429d99686ff4fbbe1180"

[[env.production.kv_namespaces]]
binding = "REDEEM_CODES_KV"
id = "59c5263942b4436191e6dffbaacc5957"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "bushi"

[[env.production.send_email]]
name = "EMAIL"
destination_address = "131551832@qq.com"

[env.production.vars]
FROM_EMAIL = "amitabha@ombhrum.com"
JWT_SECRET = "please_set_from_secret_in_production"
FLUTTER_WEB = "true"
# 支付宝配置
ALIPAY_APP_ID = "2021005193647715"
ALIPAY_PUBLIC_KEY = ""
WORKER_URL = "https://flutter.ombhrum.com"

[env.production.assets]
binding = "ASSETS"
directory = "/Users/gloriachan/Documents/全球发送/全球法布施/build/web"

# 开发环境配置
[env.development]
name = "fabushi-flutter-web-dev"

[[env.development.kv_namespaces]]
