<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球法布施</title>
  <style>
    body { margin: 0; background: #f5f5f5; font-family: Arial, sans-serif; }
    .loading { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
    }
    .spinner { 
      width: 40px; 
      height: 40px; 
      border: 4px solid #ddd; 
      border-top: 4px solid #2196F3; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .text { margin-top: 20px; color: #666; }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="text">正在加载应用...</div>
  </div>
  
  <script src="flutter.js" defer></script>
  
  <script>
    window.addEventListener('load', function(ev) {
      document.querySelector('.text').textContent = '正在初始化...';
      _flutter.loader.load().then(function(engineInitializer) {
        document.querySelector('.text').textContent = '正在启动应用...';
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        document.getElementById('loading').style.display = 'none';
        return appRunner.runApp();
      });
    });
  </script>
</body>
</html>
