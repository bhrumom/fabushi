<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球法布施 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-form {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            margin: 30px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 14px;
            position: relative;
        }

        .alipay-login {
            background: #1677ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .alipay-login:hover {
            background: #1364d9;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1677ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">法</div>
        <h1>全球法布施</h1>
        <p class="subtitle">传播佛法，利益众生</p>

        <div id="message-container"></div>

        <div id="login-form-container">
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>

            <div class="divider">
                <span>或使用</span>
            </div>

            <button type="button" class="alipay-login" id="alipayLoginBtn">
                <svg width="20" height="20" viewBox="0 0 1024 1024" fill="currentColor">
                    <path d="M1023.795 0H0v1024h1023.795V0z m-138.862 131.512h-82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816h-82.842z m-165.797-111.304h-82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816h-82.842z m-165.797-111.304h-82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816h-82.842z m-165.797-111.304H82.842v55.652h82.842v-55.652z m-82.842 111.304v278.26h82.842V242.816H82.842z"/>
                </svg>
                支付宝登录
            </button>
        </div>

        <div id="loading-container" class="hidden">
            <div style="text-align: center; padding: 40px;">
                <div class="loading"></div>
                <p style="margin-top: 20px; color: #666;">正在处理登录...</p>
            </div>
        </div>

        <div class="footer">
            <p>全球法布施平台</p>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                error: params.get('error'),
                alipay_auth_code: params.get('alipay_auth_code'),
                alipay_user_id: params.get('alipay_user_id'),
                alipay_nickname: params.get('alipay_nickname'),
                alipay_avatar: params.get('alipay_avatar'),
                needs_binding: params.get('needs_binding')
            };
        }

        // 显示消息
        function showMessage(message, type = 'error') {
            const container = document.getElementById('message-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = message;
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            // 5秒后自动隐藏
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // 处理支付宝登录回调
        function handleAlipayCallback() {
            const params = getUrlParams();
            
            if (params.error) {
                let errorMessage = '登录失败';
                switch (params.error) {
                    case 'invalid_state':
                        errorMessage = '登录状态无效，请重新登录';
                        break;
                    case 'missing_auth_code':
                        errorMessage = '授权失败，请重新登录';
                        break;
                    case 'callback_failed':
                        errorMessage = '登录处理失败，请重新登录';
                        break;
                    default:
                        errorMessage = `登录失败：${params.error}`;
                }
                showMessage(errorMessage, 'error');
            } else if (params.alipay_auth_code && params.alipay_user_id) {
                // 支付宝登录成功
                showMessage(`欢迎回来，${params.alipay_nickname || '支付宝用户'}！`, 'success');
                
                // 如果needs_binding为true，显示绑定表单
                if (params.needs_binding === 'true') {
                    showBindingForm(params);
                } else {
                    // 直接跳转到主应用
                    setTimeout(() => {
                            // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                            window.location.href = `/index.html#token=${result.token}&username=${result.username}`;
                        }, 2000);
                }
            }
        }

        // 显示绑定表单
        function showBindingForm(alipayData) {
            const formContainer = document.getElementById('login-form-container');
            formContainer.innerHTML = `
                <h3 style="margin-bottom: 20px; color: #333;">绑定账号</h3>
                <div style="display: flex; align-items: center; margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                    <img src="${alipayData.alipay_avatar}" alt="头像" style="width: 50px; height: 50px; border-radius: 50%; margin-right: 15px;">
                    <div style="text-align: left;">
                        <div style="font-weight: 500; color: #333;">${alipayData.alipay_nickname}</div>
                        <div style="font-size: 12px; color: #999;">支付宝用户ID: ${alipayData.alipay_user_id}</div>
                    </div>
                </div>
                <form class="login-form" id="bindingForm">
                    <div class="form-group">
                        <label for="bindEmail">邮箱</label>
                        <input type="email" id="bindEmail" name="email" required placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label for="bindPassword">密码</label>
                        <input type="password" id="bindPassword" name="password" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="login-btn">绑定并登录</button>
                </form>
                <button type="button" class="alipay-login" onclick="window.location.href='/'" style="margin-top: 15px;">
                    跳过绑定，直接使用
                </button>
            `;

            document.getElementById('bindingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleBinding(alipayData);
            });
        }

        // 处理绑定
        async function handleBinding(alipayData) {
            const email = document.getElementById('bindEmail').value;
            const password = document.getElementById('bindPassword').value;

            showLoading();

            try {
                const response = await fetch('/api/auth/alipay/bind', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        alipayUserId: alipayData.alipay_user_id,
                        email: email,
                        password: password,
                        nickname: alipayData.alipay_nickname,
                        avatar: alipayData.alipay_avatar
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('绑定成功！', 'success');
                    setTimeout(() => {
                        // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                        window.location.href = `/index.html#token=${result.token}&username=${result.username}`;
                    }, 1500);
                } else {
                    showMessage(result.message || '绑定失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            } finally {
                hideLoading();
            }
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('loading-container').classList.remove('hidden');
            document.getElementById('login-form-container').classList.add('hidden');
        }

        // 隐藏加载状态
        function hideLoading() {
            document.getElementById('loading-container').classList.add('hidden');
            document.getElementById('login-form-container').classList.remove('hidden');
        }

        // 处理传统登录
        async function handleTraditionalLogin(email, password) {
            showLoading();

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('登录成功！', 'success');
                    setTimeout(() => {
                    // 将token通过URL hash传递给Flutter应用，确保Flutter能正确识别登录状态
                    window.location.href = `/index.html#token=${token}&username=${username}`;
                }, 1500);
                } else {
                    showMessage(result.message || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            } finally {
                hideLoading();
            }
        }

        // 处理支付宝登录
        async function handleAlipayLogin() {
            try {
                const response = await fetch('/api/auth/alipay/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const result = await response.json();

                if (result.success && result.loginUrl) {
                    // 重定向到支付宝登录页面
                    window.location.href = result.loginUrl;
                } else {
                    showMessage('支付宝登录初始化失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            }
        }

        // 事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            // 处理支付宝回调
            handleAlipayCallback();

            // 传统登录表单提交
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await handleTraditionalLogin(email, password);
            });

            // 支付宝登录按钮
            document.getElementById('alipayLoginBtn').addEventListener('click', handleAlipayLogin);
        });
    </script>
</body>
</html>
