name: global_dharma_sharing
description: A new Flutter project.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0+1
  path_provider: ^2.0.15
  permission_handler: ^11.0.1
  provider: ^6.0.5
  shelf: ^1.4.1
  shelf_static: ^1.1.2
  network_info_plus: ^5.0.3
  flutter_local_notifications: ^17.0.0
  path: ^1.8.3
  latlong2: ^0.9.1
  flutter_map: ^8.2.1
  geolocator: ^14.0.2
  vector_math: ^2.1.4
  shared_preferences: ^2.2.2
  archive: ^4.0.7
  csv: ^6.0.0
  dio: ^5.4.1
  connectivity_plus: ^6.0.3
  js: ^0.6.7
  flutter_localizations:
    sdk: flutter
  intl: any
  async: ^2.13.0
  searchfield: ^1.3.5

  flutter_earth_globe: ^1.0.7
  universal_html: ^2.2.4
  url_launcher: ^6.1.11
  tobias: ^3.3.0
  webview_flutter: ^4.4.2
  flutter_inappwebview: ^6.0.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  three_js: ^0.1.7
  three_js_core: any
  three_js_math: any
  three_js_objects: any
  three_js_helpers: any
  three_js_core_loaders: any
  three_js_advanced_loaders: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/built_in/
    - assets/models/
    - assets/earth_texture.jpg
    # IP data excluded from web build
    # - assets/ip_data/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Regular.otf
        - asset: fonts/NotoSansSC-Bold.otf
          weight: 700
    - family: NotoSerifSC
      fonts:
        - asset: fonts/NotoSerifSC-Regular.otf
        - asset: fonts/NotoSerifSC-Bold.otf
          weight: 700