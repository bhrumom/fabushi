<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D佛像</title>
  <style>
    body { margin: 0; overflow: hidden; background: #3E2723; }
    #container { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x3E2723);
    container.appendChild(renderer.domElement);

    camera.position.set(0, 100, 300);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffd700, 1.5);
    directionalLight.position.set(0, 200, 100);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xffd700, 1, 500);
    pointLight.position.set(0, 150, 0);
    scene.add(pointLight);

    const loader = new GLTFLoader();
    loader.load('assets/models/佛像模型.glb', (gltf) => {
      const model = gltf.scene;
      model.scale.set(0.5, 0.5, 0.5);
      scene.add(model);
      
      model.traverse((child) => {
        if (child.isMesh) {
          child.material.metalness = 0.9;
          child.material.roughness = 0.1;
          child.material.color.setHex(0xFFD700);
        }
      });
    }, undefined, (error) => {
      console.error('加载模型失败:', error);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight, false);
    });

    animate();
  </script>
</body>
</html>
