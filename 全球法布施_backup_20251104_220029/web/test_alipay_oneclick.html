<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付宝一键注册测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .status {
      font-size: 18px;
      color: #666;
      margin: 20px 0;
      min-height: 30px;
      padding: 10px;
      border-radius: 5px;
      background-color: #f9f9f9;
    }
    button {
      background-color: #1677ff;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin: 10px;
    }
    button:hover {
      background-color: #4096ff;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1677ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🙏 支付宝一键注册测试</h1>
    <div class="status" id="status">准备就绪</div>
    
    <button id="testBtn" onclick="testOneClickRegistration()">
      测试支付宝一键注册
    </button>
    
    <button id="loginBtn" onclick="testAlipayLogin()">
      测试支付宝登录
    </button>
    
    <button id="clearBtn" onclick="clearTestData()">
      清除测试数据
    </button>
    
    <div style="margin-top: 20px; text-align: left;">
      <h3>测试流程：</h3>
      <ol>
        <li>点击"测试支付宝一键注册"按钮</li>
        <li>系统会跳转到支付宝授权页面</li>
        <li>在支付宝页面完成授权</li>
        <li>返回应用查看注册结果</li>
      </ol>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://fabushi-flutter-web.bhrumom.workers.dev';
    let isLoading = false;

    function updateStatus(message, type = 'info') {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function setLoading(loading) {
      isLoading = loading;
      const buttons = document.querySelectorAll('button');
      buttons.forEach(btn => {
        if (btn.id !== 'clearBtn') {
          btn.disabled = loading;
          if (loading && btn.id === 'testBtn') {
            btn.innerHTML = '测试中<span class="loading"></span>';
          } else if (!loading && btn.id === 'testBtn') {
            btn.innerHTML = '测试支付宝一键注册';
          }
        }
      });
    }

    async function testOneClickRegistration() {
      if (isLoading) return;
      
      setLoading(true);
      updateStatus('正在获取支付宝授权链接...', 'info');

      try {
        // 1. 获取支付宝登录链接
        const loginResponse = await fetch(`${WORKER_URL}/api/auth/alipay/login-url`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            platform: 'web'
          })
        });

        const loginData = await loginResponse.json();
        
        if (!loginData.success || !loginData.loginUrl) {
          throw new Error(loginData.error || '获取登录链接失败');
        }

        updateStatus('正在跳转到支付宝授权页面...', 'info');
        
        // 2. 跳转到支付宝授权页面
        window.location.href = loginData.loginUrl;
        
      } catch (error) {
        console.error('一键注册测试失败:', error);
        updateStatus(`测试失败: ${error.message}`, 'error');
        setLoading(false);
      }
    }

    async function testAlipayLogin() {
      if (isLoading) return;
      
      setLoading(true);
      updateStatus('正在获取支付宝登录链接...', 'info');

      try {
        // 获取支付宝登录链接
        const loginResponse = await fetch(`${WORKER_URL}/api/auth/alipay/login-url`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            platform: 'web'
          })
        });

        const loginData = await loginResponse.json();
        
        if (!loginData.success || !loginData.loginUrl) {
          throw new Error(loginData.error || '获取登录链接失败');
        }

        updateStatus('正在跳转到支付宝登录页面...', 'info');
        
        // 跳转到支付宝登录页面
        window.location.href = loginData.loginUrl;
        
      } catch (error) {
        console.error('支付宝登录测试失败:', error);
        updateStatus(`测试失败: ${error.message}`, 'error');
        setLoading(false);
      }
    }

    function clearTestData() {
      // 清除本地存储的测试数据
      localStorage.clear();
      sessionStorage.clear();
      updateStatus('测试数据已清除', 'success');
    }

    // 检查是否有回调参数
    window.addEventListener('load', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const authCode = urlParams.get('auth_code');
      const state = urlParams.get('state');
      
      if (authCode) {
        updateStatus('检测到支付宝授权码，正在处理...', 'info');
        // 这里可以添加处理授权码的逻辑
        setTimeout(() => {
          updateStatus('授权码已接收: ' + authCode.substring(0, 10) + '...', 'success');
        }, 1000);
      }
    });
  </script>
</body>
</html>
