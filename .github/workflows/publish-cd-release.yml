name: Publish CD packages to GitHub Release

on:
  workflow_run:
    workflows:
      - CD - Staging API gated production deploy
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      cd_run_id:
        description: Completed CD workflow run id to publish. Leave empty to use the current run context when applicable.
        required: false
        type: string
      source_sha:
        description: Source commit SHA to use for release naming when CD artifacts do not include SOURCE_SHA.
        required: false
        type: string

concurrency:
  group: publish-cd-release-${{ github.event.workflow_run.id || inputs.cd_run_id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  FLUTTER_VERSION: '3.41.9'

jobs:
  resolve-cd-context:
    name: Resolve completed CD context and mobile changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cd_run_id: ${{ steps.source.outputs.cd_run_id }}
      source_sha: ${{ steps.source.outputs.source_sha }}
      release_build_number: ${{ steps.source.outputs.release_build_number }}
      android_changed: ${{ steps.mobile-changes.outputs.android_changed }}
      ios_changed: ${{ steps.mobile-changes.outputs.ios_changed }}
      mobile_changed: ${{ steps.mobile-changes.outputs.mobile_changed }}
    steps:
      - name: Resolve CD run id
        id: cd-run
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_CD_RUN_ID: ${{ inputs.cd_run_id }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            cd_run_id="$WORKFLOW_RUN_ID"
          elif [ -n "${INPUT_CD_RUN_ID:-}" ]; then
            cd_run_id="$INPUT_CD_RUN_ID"
          else
            echo "workflow_dispatch requires cd_run_id so the release job can download the completed CD artifacts." >&2
            exit 1
          fi
          echo "cd_run_id=$cd_run_id" >> "$GITHUB_OUTPUT"
          echo "Resolved CD run id: $cd_run_id"

      - name: Check CD artifacts for source metadata
        id: cd-artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          CD_RUN_ID: ${{ steps.cd-run.outputs.cd_run_id }}
        run: |
          set -euo pipefail
          artifact_count="$(
            gh api -H 'Accept: application/vnd.github+json' \
              "/repos/$RELEASE_REPO/actions/runs/$CD_RUN_ID/artifacts" \
              --jq '[.artifacts[] | select(.expired == false)] | length' 2>/dev/null || true
          )"
          if ! [[ "$artifact_count" =~ ^[0-9]+$ ]]; then
            artifact_count=0
          fi
          if [ "$artifact_count" -gt 0 ]; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi
          echo "CD artifact count: $artifact_count"

      - name: Download CD artifacts for source metadata
        if: steps.cd-artifacts.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.cd-run.outputs.cd_run_id }}
          path: downloaded-cd-artifacts

      - name: Resolve source commit
        id: source
        shell: bash
        env:
          CD_RUN_ID: ${{ steps.cd-run.outputs.cd_run_id }}
          EVENT_SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          source_sha="${INPUT_SOURCE_SHA:-${EVENT_SOURCE_SHA:-}}"
          if [ -z "$source_sha" ] && compgen -G 'downloaded-cd-artifacts/fabushi-release-*/SOURCE_SHA' > /dev/null; then
            source_sha="$(cat downloaded-cd-artifacts/fabushi-release-*/SOURCE_SHA | head -n 1 | tr -d '[:space:]')"
          fi
          if [ -z "$source_sha" ]; then
            echo "Unable to resolve source SHA from workflow event, input, or SOURCE_SHA artifact." >&2
            exit 1
          fi

          release_build_number="${GITHUB_RUN_NUMBER:-}"
          if ! [[ "$release_build_number" =~ ^[0-9]+$ ]] || [ "$release_build_number" -le 16 ]; then
            release_build_number=17
          fi

          echo "cd_run_id=$CD_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "release_build_number=$release_build_number" >> "$GITHUB_OUTPUT"
          echo "Resolved source SHA: $source_sha"
          echo "Resolved mobile build number: $release_build_number"

      - name: Checkout source for change detection
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.source.outputs.source_sha }}
          persist-credentials: false
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/**

      - name: Detect changed mobile package targets
        id: mobile-changes
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          RELEASE_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          changed_files="changed-files.txt"
          if git rev-parse "$SOURCE_SHA^" >/dev/null 2>&1; then
            git diff --name-only "$SOURCE_SHA^" "$SOURCE_SHA" > "$changed_files"
          else
            git diff-tree --root --no-commit-id --name-only -r "$SOURCE_SHA" > "$changed_files"
          fi

          android_changed=false
          ios_changed=false
          mobile_reasons=()
          non_mobile_reasons=()

          add_android() {
            android_changed=true
            mobile_reasons+=("Android: $1")
          }

          add_ios() {
            ios_changed=true
            mobile_reasons+=("iOS: $1")
          }

          add_both() {
            android_changed=true
            ios_changed=true
            mobile_reasons+=("Android+iOS: $1")
          }

          ignore_mobile_package() {
            non_mobile_reasons+=("$1")
          }

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              fabushi/android/*)
                add_android "Android platform package input changed: $path"
                ;;
              fabushi/ios/*)
                add_ios "iOS platform package input changed: $path"
                ;;
              fabushi/lib/*|fabushi/assets/*|fabushi/fonts/*|fabushi/pubspec.yaml|fabushi/pubspec.lock|fabushi/analysis_options.yaml|fabushi/l10n.yaml)
                add_both "shared Flutter package input changed: $path"
                ;;
              frontend/*)
                # 修复：明确排除逻辑，确保 frontend 变动不会影响 mobile 构建判定
                ignore_mobile_package "official site input does not require mobile install packages: $path"
                ;;
              fabushi/test/*|fabushi/integration_test/*|fabushi/e2e/*)
                ignore_mobile_package "mobile tests or release gates changed without app package input: $path"
                ;;
              fabushi/web/*|workers/*|worker/*|functions/*|api/*|server/*|migrations/*|drizzle/*|supabase/*|cloudflare/*|wrangler.toml|wrangler.*.toml|package.json|package-lock.json|pnpm-lock.yaml|yarn.lock)
                ignore_mobile_package "Worker/API input does not require mobile install packages: $path"
                ;;
              .github/workflows/*|.github/scripts/*)
                ignore_mobile_package "CI/CD guardrail input does not require mobile install packages: $path"
                ;;
            esac
          done < "$changed_files"

          pr_json=""
          if command -v gh >/dev/null 2>&1 && [ -n "${RELEASE_REPO:-}" ]; then
            pr_json="$(gh api -H 'Accept: application/vnd.github+json' "/repos/$RELEASE_REPO/commits/$SOURCE_SHA/pulls" 2>/dev/null || true)"
          fi

          if [ -n "$pr_json" ] && command -v jq >/dev/null 2>&1; then
            pr_labels="$(printf '%s' "$pr_json" | jq -r '.[0].labels[]?.name // empty' | tr '\n' ' ')"
            if printf '%s\n' "$pr_labels" | grep -Eiq '(^|[[:space:]])(force[- ]?mobile[- ]?release|mobile[- ]?release|build[- ]?mobile[- ]?package|build[- ]?app[- ]?package)([[:space:]]|$)'; then
              add_both "PR label explicitly requests fresh install packages"
            fi
          fi

          mobile_changed=false
          if [ "$android_changed" = "true" ] || [ "$ios_changed" = "true" ]; then
            mobile_changed=true
          fi

          {
            echo "android_changed=$android_changed"
            echo "ios_changed=$ios_changed"
            echo "mobile_changed=$mobile_changed"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Mobile package change detection"
            echo ""
            echo "- Source SHA: $SOURCE_SHA"
            echo "- Android package changed: $android_changed"
            echo "- iOS package changed: $ios_changed"
            echo ""
            echo "### Detection reasons"
            echo ""
            if [ "${#mobile_reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${mobile_reasons[@]}" | awk '!seen[$0]++ { printf "- `%s`\n", $0 }'
            else
              echo "- No mobile app package inputs matched."
            fi
            if [ "${#non_mobile_reasons[@]}" -gt 0 ]; then
              echo ""
              echo "### Non-package changes ignored"
              echo ""
              printf '%s\n' "${non_mobile_reasons[@]}" | awk '!seen[$0]++ { printf "- `%s`\n", $0 }'
            fi
            echo ""
            echo "### Changed files"
            echo ""
            sed 's/^/- `/' "$changed_files" | sed 's/$/`/' || true
          } >> "$GITHUB_STEP_SUMMARY"

  build-android-packages:
    name: Build Android release packages
    needs: resolve-cd-context
    if: needs.resolve-cd-context.outputs.android_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-cd-context.outputs.source_sha }}
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Build Android install packages
        shell: bash
        env:
          GRADLE_OPTS: -Xmx6g -Dfile.encoding=UTF-8
          RELEASE_BUILD_NUMBER: ${{ needs.resolve-cd-context.outputs.release_build_number }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required for GitHub Release APK signing." >&2
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          chmod 600 android/app/release-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release-keystore.jks
          EOF
          cat >> android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          kotlin.daemon.jvm.options=-Xmx3g
          EOF
          flutter pub get
          flutter build apk --release --build-number "$RELEASE_BUILD_NUMBER" --target-platform android-arm64
          flutter build appbundle --release --build-number "$RELEASE_BUILD_NUMBER"

      - name: Normalize Google Play review handoff
        id: google-play-review
        shell: bash
        env:
          GOOGLE_PLAY_TRACKS: ${{ vars.GOOGLE_PLAY_TRACKS || 'production' }}
          GOOGLE_PLAY_CHANGES_NOT_SENT_FOR_REVIEW: ${{ vars.GOOGLE_PLAY_CHANGES_NOT_SENT_FOR_REVIEW }}
        run: |
          set -euo pipefail
          changes_not_sent_for_review="${GOOGLE_PLAY_CHANGES_NOT_SENT_FOR_REVIEW:-}"
          track="${GOOGLE_PLAY_TRACKS:-production}"

          if [ -z "$changes_not_sent_for_review" ]; then
            changes_not_sent_for_review=true
          fi

          case "$track:$changes_not_sent_for_review" in
            production:true|production:TRUE|production:True|production:1|production:yes|production:YES)
              changes_not_sent_for_review=true
              ;;
            production:*)
              echo "Google Play production uploads require changesNotSentForReview=true; forcing manual review handoff."
              changes_not_sent_for_review=true
              ;;
          esac

          echo "changes_not_sent_for_review=$changes_not_sent_for_review" >> "$GITHUB_OUTPUT"
          {
            echo "## Google Play publish mode"
            echo ""
            echo "- Track: $track"
            echo "- changesNotSentForReview: $changes_not_sent_for_review"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android app bundle to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_PACKAGE_NAME: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME || 'com.ombhrum.fabushi' }}
          GOOGLE_PLAY_TRACKS: ${{ vars.GOOGLE_PLAY_TRACKS || 'production' }}
          GOOGLE_PLAY_RELEASE_STATUS: ${{ vars.GOOGLE_PLAY_RELEASE_STATUS || 'completed' }}
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.GOOGLE_PLAY_PACKAGE_NAME }}
          releaseFiles: fabushi/build/app/outputs/bundle/release/app-release.aab
          tracks: ${{ env.GOOGLE_PLAY_TRACKS }}
          status: ${{ env.GOOGLE_PLAY_RELEASE_STATUS }}
          releaseName: ${{ needs.resolve-cd-context.outputs.release_build_number }}-${{ needs.resolve-cd-context.outputs.source_sha }}
          changesNotSentForReview: ${{ steps.google-play-review.outputs.changes_not_sent_for_review }}

      - name: Stage Android release packages
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${{ needs.resolve-cd-context.outputs.source_sha }}"
          short_sha="${short_sha:0:12}"
          mkdir -p ../android-release-assets
          cp build/app/outputs/flutter-apk/app-release.apk "../android-release-assets/fabushi-android-arm64-${short_sha}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "../android-release-assets/fabushi-android-${short_sha}.aab"

      - name: Upload Android release packages
        uses: actions/upload-artifact@v7
        with:
          name: release-android-packages
          path: android-release-assets
          if-no-files-found: error
          retention-days: 30

  build-ios-package:
    name: Build signed iOS IPA
    needs: resolve-cd-context
    if: needs.resolve-cd-context.outputs.ios_changed == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: fabushi
    env:
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'app-store' }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      RELEASE_BUILD_NUMBER: ${{ needs.resolve-cd-context.outputs.release_build_number }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-cd-context.outputs.source_sha }}
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Check iOS signing configuration
        id: ios-signing
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in IOS_CERTIFICATE_P12_BASE64 IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          mkdir -p ../ios-release-assets
          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "iOS IPA was not built because signing credentials are not configured."
              echo ""
              echo "Required repository secrets:"
              printf -- '- %s\n' "${missing[@]}"
              echo ""
              echo "Optional TestFlight upload secrets:"
              echo "- APP_STORE_CONNECT_API_KEY_ID"
              echo "- APP_STORE_CONNECT_API_ISSUER_ID"
              echo "- APP_STORE_CONNECT_API_KEY_BASE64"
            } > ../ios-release-assets/IOS_SIGNING_NOT_CONFIGURED.txt
            {
              echo "status=skipped"
              echo "reason=ios_signing_not_configured"
              echo "source_sha=${{ needs.resolve-cd-context.outputs.source_sha }}"
              echo "build_number=$RELEASE_BUILD_NUMBER"
              echo "uploaded_at="
            } > ../ios-release-assets/TESTFLIGHT_UPLOAD_STATUS.txt
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Install iOS signing identity and provisioning profile
        if: steps.ios-signing.outputs.configured == 'true'
        id: install-signing
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/ios_distribution.p12"
          profile_path="$RUNNER_TEMP/fabushi.mobileprovision"
          profile_plist="$RUNNER_TEMP/fabushi-profile.plist"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert_path"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")"
          team_id="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          bundle_id="$(grep -m 1 'PRODUCT_BUNDLE_IDENTIFIER = ' ios/Runner.xcodeproj/project.pbxproj | sed -E 's/.*PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);/\1/' | tr -d ' ')"
          if [ -z "$bundle_id" ]; then
            echo "Could not detect PRODUCT_BUNDLE_IDENTIFIER from ios/Runner.xcodeproj/project.pbxproj" >&2
            exit 1
          fi

          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${team_id}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${bundle_id}</key>
              <string>${profile_name}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          cat >> ios/Flutter/Release.xcconfig <<EOF
          DEVELOPMENT_TEAM=${team_id}
          CODE_SIGN_STYLE=Manual
          PROVISIONING_PROFILE_SPECIFIER=${profile_name}
          EOF

          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"${profile_name}\";/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Build signed iOS IPA
        if: steps.ios-signing.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter build ipa --release --build-number "$RELEASE_BUILD_NUMBER" --export-options-plist=ios/ExportOptions.plist

          short_sha="${{ needs.resolve-cd-context.outputs.source_sha }}"
          short_sha="${short_sha:0:12}"
          ipa_path="$(find build/ios/ipa -name '*.ipa' -type f | head -n 1)"
          if [ -z "$ipa_path" ]; then
            echo "flutter build ipa completed but no IPA was found under build/ios/ipa" >&2
            exit 1
          fi
          cp "$ipa_path" "../ios-release-assets/fabushi-ios-${short_sha}.ipa"

      - name: Upload signed iOS IPA to App Store Connect
        if: steps.ios-signing.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          status_file="../ios-release-assets/TESTFLIGHT_UPLOAD_STATUS.txt"
          if [ -z "${APP_STORE_CONNECT_API_KEY_ID:-}" ] || [ -z "${APP_STORE_CONNECT_API_ISSUER_ID:-}" ] || [ -z "${APP_STORE_CONNECT_API_KEY_BASE64:-}" ]; then
            {
              echo "status=skipped"
              echo "reason=app_store_connect_credentials_not_configured"
              echo "source_sha=${{ needs.resolve-cd-context.outputs.source_sha }}"
              echo "build_number=$RELEASE_BUILD_NUMBER"
              echo "uploaded_at="
            } > "$status_file"
            echo "App Store Connect credentials are not configured; iOS IPA will be attached to GitHub Release only."
            exit 0
          fi

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          ipa_path="$(find ../ios-release-assets -name '*.ipa' -type f | head -n 1)"
          if [ -z "$ipa_path" ]; then
            echo "No IPA found for App Store Connect upload." >&2
            exit 1
          fi

          if xcrun altool --upload-app --type ios --file "$ipa_path" --apiKey "$APP_STORE_CONNECT_API_KEY_ID" --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"; then
            {
              echo "status=uploaded"
              echo "reason=accepted_by_app_store_connect"
              echo "source_sha=${{ needs.resolve-cd-context.outputs.source_sha }}"
              echo "build_number=$RELEASE_BUILD_NUMBER"
              echo "uploaded_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            } > "$status_file"
          else
            status=$?
            {
              echo "status=failed"
              echo "reason=app_store_connect_upload_failed"
              echo "source_sha=${{ needs.resolve-cd-context.outputs.source_sha }}"
              echo "build_number=$RELEASE_BUILD_NUMBER"
              echo "uploaded_at="
            } > "$status_file"
            exit "$status"
          fi

      - name: Upload iOS release package artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-ios-packages
          path: ios-release-assets
          if-no-files-found: error
          retention-days: 30

  capture-screenshots:
    name: Capture app screenshots
    needs: resolve-cd-context
    if: ${{ false }}
    runs-on: macos-26
    timeout-minutes: 45
    continue-on-error: true
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Screenshot automation disabled
        run: echo "Official site screenshots are now maintained manually in frontend/apps/web/public/product."

  publish-release:
    name: Publish changed mobile packages
    needs:
      - resolve-cd-context
      - build-android-packages
      - build-ios-package
      - capture-screenshots
    if: >-
      always() &&
      needs.resolve-cd-context.result == 'success' &&
      needs.resolve-cd-context.outputs.mobile_changed == 'true' &&
      (needs.resolve-cd-context.outputs.android_changed != 'true' || needs.build-android-packages.result == 'success') &&
      (needs.resolve-cd-context.outputs.ios_changed != 'true' || needs.build-ios-package.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download Android release packages
        if: needs.resolve-cd-context.outputs.android_changed == 'true'
        uses: actions/download-artifact@v5
        with:
          name: release-android-packages
          path: built-native-packages/android

      - name: Download iOS release packages
        if: needs.resolve-cd-context.outputs.ios_changed == 'true'
        uses: actions/download-artifact@v5
        with:
          name: release-ios-packages
          path: built-native-packages/ios

      - name: Checkout source for version metadata
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-cd-context.outputs.source_sha }}
          persist-credentials: false
          clean: false
          path: version-metadata
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/pubspec.yaml

      - name: Prepare release assets
        id: release-assets
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.resolve-cd-context.outputs.source_sha }}
          RUN_ID: ${{ needs.resolve-cd-context.outputs.cd_run_id }}
          RELEASE_BUILD_NUMBER: ${{ needs.resolve-cd-context.outputs.release_build_number }}
          RELEASE_REPO: ${{ github.repository }}
          ANDROID_CHANGED: ${{ needs.resolve-cd-context.outputs.android_changed }}
          IOS_CHANGED: ${{ needs.resolve-cd-context.outputs.ios_changed }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          source_sha="$SOURCE_SHA"
          short_sha="${source_sha:0:12}"

          raw_app_version="unknown"
          version_name="unknown"
          if [ -f version-metadata/fabushi/pubspec.yaml ]; then
            raw_app_version="$(awk '/^version:/ {print $2; exit}' version-metadata/fabushi/pubspec.yaml)"
            version_name="${raw_app_version%%+*}"
          fi

          app_version="$raw_app_version"
          if [ -n "${RELEASE_BUILD_NUMBER:-}" ] && [ "$version_name" != "unknown" ]; then
            app_version="${version_name}+${RELEASE_BUILD_NUMBER}"
          fi

          safe_version="$(printf '%s' "$app_version" | tr '+/' '--' | tr -cd '[:alnum:]._-' )"
          if [ -z "$safe_version" ] || [ "$safe_version" = "unknown" ]; then
            tag="cd-mobile-$short_sha"
            title="Fabushi mobile CD $short_sha"
          else
            tag="v$safe_version-mobile.$short_sha"
            title="Fabushi mobile $app_version ($short_sha)"
          fi

          pr_title=""
          pr_number=""
          pr_body=""
          pr_change_lines=""
          if pr_json="$(gh api -H 'Accept: application/vnd.github+json' "/repos/$RELEASE_REPO/commits/$source_sha/pulls" 2>/dev/null)" && [ -n "$pr_json" ]; then
            pr_number="$(printf '%s' "$pr_json" | jq -r '.[0].number // empty')"
            pr_title="$(printf '%s' "$pr_json" | jq -r '.[0].title // empty')"
            pr_body="$(printf '%s' "$pr_json" | jq -r '.[0].body // empty')"
            pr_change_lines="$(printf '%s\n' "$pr_body" | awk '/^- / { print; count += 1; if (count == 6) exit }')"
          fi
          commit_subject="$(git -C version-metadata show -s --format=%s "$source_sha" 2>/dev/null || true)"

          mkdir -p release-assets built-native-packages

          while IFS= read -r file; do
            [ -f "$file" ] || continue
            case "$file" in
              *.apk|*.aab|*.ipa)
                base="$(basename "$file")"
                safe_base="$(printf '%s' "$base" | tr ' ' '-' | tr -cd '[:alnum:]._+-')"
                cp "$file" "release-assets/$safe_base"
                ;;
            esac
          done < <(find built-native-packages -type f 2>/dev/null)

          if [ "$IOS_CHANGED" = "true" ]; then
            for metadata_file in TESTFLIGHT_UPLOAD_STATUS.txt IOS_SIGNING_NOT_CONFIGURED.txt; do
              if [ -f "built-native-packages/ios/$metadata_file" ]; then
                cp "built-native-packages/ios/$metadata_file" "release-assets/$metadata_file"
              fi
            done
          fi

          if [ -z "$(find release-assets -type f -print -quit)" ]; then
            echo "No mobile release package files were found or built." >&2
            echo "Expected Android APK/AAB, iOS IPA, or iOS signing/TestFlight status artifacts." >&2
            exit 1
          fi

          sha256sum release-assets/* > release-assets/SHA256SUMS.txt

          {
            echo "tag=$tag"
            echo "title=$title"
            echo "source_sha=$source_sha"
            echo "short_sha=$short_sha"
            echo "app_version=$app_version"
          } >> "$GITHUB_OUTPUT"

          {
            echo "# $title"
            echo ""
            echo "- Source SHA: $source_sha"
            echo "- CD workflow run: $RUN_ID"
            echo "- App version: $app_version"
            echo "- Mobile build number: ${RELEASE_BUILD_NUMBER:-unknown}"
            echo "- Android package changed: $ANDROID_CHANGED"
            echo "- iOS package changed: $IOS_CHANGED"
            echo ""
            echo "## Included changes"
            echo ""
            if [ -n "$pr_number" ] && [ -n "$pr_title" ]; then
              echo "- PR #$pr_number: $pr_title"
            elif [ -n "$commit_subject" ]; then
              echo "- Commit: $commit_subject"
            else
              echo "- This release packages the latest validated main branch source commit."
            fi
            if [ -n "$pr_change_lines" ]; then
              printf '%s\n' "$pr_change_lines"
            fi
            echo ""
            echo "## Assets"
            echo ""
            find release-assets -maxdepth 1 -type f -printf '- `%f`\n' | sort
            echo ""
            echo "## Platform publishing"
            echo ""
            if [ "$ANDROID_CHANGED" = "true" ]; then
              echo "- Android packages were built and attached."
            else
              echo "- Android packages were skipped because no Android or shared mobile-affecting inputs changed."
            fi
            if [ "$IOS_CHANGED" = "true" ]; then
              if find release-assets -maxdepth 1 -name '*.ipa' -type f | grep -q .; then
                echo "- Signed iOS IPA is attached."
              else
                echo "- iOS IPA was not attached because signing secrets are not configured or no IPA was produced."
              fi
              if [ -f release-assets/TESTFLIGHT_UPLOAD_STATUS.txt ]; then
                tf_status="$(awk -F= '$1 == "status" { print $2 }' release-assets/TESTFLIGHT_UPLOAD_STATUS.txt)"
                tf_reason="$(awk -F= '$1 == "reason" { print $2 }' release-assets/TESTFLIGHT_UPLOAD_STATUS.txt)"
                tf_uploaded_at="$(awk -F= '$1 == "uploaded_at" { print $2 }' release-assets/TESTFLIGHT_UPLOAD_STATUS.txt)"
                tf_build_number="$(awk -F= '$1 == "build_number" { print $2 }' release-assets/TESTFLIGHT_UPLOAD_STATUS.txt)"
                if [ -n "$tf_build_number" ]; then
                  echo "- TestFlight build number: $tf_build_number"
                fi
                case "$tf_status" in
                  uploaded)
                    echo "- TestFlight upload: uploaded${tf_uploaded_at:+ at $tf_uploaded_at}."
                    ;;
                  skipped)
                    echo "- TestFlight upload: skipped ($tf_reason)."
                    ;;
                  failed)
                    echo "- TestFlight upload: failed ($tf_reason)."
                    ;;
                  *)
                    echo "- TestFlight upload: status recorded in TESTFLIGHT_UPLOAD_STATUS.txt."
                    ;;
                esac
              fi
            else
              echo "- iOS packages were skipped because no iOS or shared mobile-affecting inputs changed."
            fi
            echo ""
            echo "## Integrity"
            echo ""
            echo 'SHA-256 checksums are attached in `SHA256SUMS.txt`.'
          } > release-notes.md

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          TAG: ${{ steps.release-assets.outputs.tag }}
          TITLE: ${{ steps.release-assets.outputs.title }}
          SOURCE_SHA: ${{ steps.release-assets.outputs.source_sha }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$RELEASE_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$RELEASE_REPO" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --target "$SOURCE_SHA" \
              --latest
          else
            gh release create "$TAG" release-assets/* \
              --repo "$RELEASE_REPO" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --target "$SOURCE_SHA" \
              --latest
            exit 0
          fi

          gh release upload "$TAG" release-assets/* --repo "$RELEASE_REPO" --clobber

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## GitHub Release published"
            echo ""
            echo "- Tag: ${{ steps.release-assets.outputs.tag }}"
            echo "- Source SHA: ${{ steps.release-assets.outputs.source_sha }}"
            echo "- App version: ${{ steps.release-assets.outputs.app_version }}"
            echo "- Android package changed: ${{ needs.resolve-cd-context.outputs.android_changed }}"
            echo "- iOS package changed: ${{ needs.resolve-cd-context.outputs.ios_changed }}"
            echo ""
            echo "### Uploaded assets"
            echo ""
            find release-assets -maxdepth 1 -type f -printf '- `%f`\n' | sort
          } >> "$GITHUB_STEP_SUMMARY"

  notify-release-failure:
    name: Notify package release failure
    needs:
      - resolve-cd-context
      - build-android-packages
      - build-ios-package
      - publish-release
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout failure notifier
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**

      - name: Create or update detailed package release failure issue
        uses: actions/github-script@v8
        env:
          SOURCE_SHA: ${{ needs.resolve-cd-context.outputs.source_sha || github.event.workflow_run.head_sha || inputs.source_sha || github.sha }}
          CD_RUN_ID: ${{ needs.resolve-cd-context.outputs.cd_run_id || github.event.workflow_run.id || inputs.cd_run_id || '' }}
        with:
          script: |
            const { createOrUpdateFailureIssue } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await createOrUpdateFailureIssue({
              github,
              context,
              core,
              kind: 'package release',
              titlePrefix: 'Package release failed for',
              sourceSha: process.env.SOURCE_SHA || context.sha,
              sourceRef: 'main',
              labelName: 'release-failure',
              labelColor: 'b60205',
              labelDescription: 'Native package or GitHub Release publication failed',
              notifyJobName: 'Notify package release failure',
              extraSections: [
                '### Release gates',
                '',
                '- Completed production CD workflow context',
                '- Android package build when Android or shared Flutter app inputs changed, or an explicit PR label requests it',
                '- iOS package build when iOS or shared Flutter app inputs changed, or an explicit PR label requests it',
                '- GitHub Release asset preparation and publish',
                '',
                '### Source CD context',
                '',
                `- CD workflow run ID: ${process.env.CD_RUN_ID || 'unknown'}`,
                '- This workflow publishes install packages after the main production CD workflow succeeds and the change detector finds mobile app package inputs.',
              ],
            });
