name: Container checks - Forum

on:
  pull_request:
    paths:
      - "forum/**"
      - ".github/workflows/forum-container-checks.yml"
  push:
    branches:
      - main
    paths:
      - "forum/**"
      - ".github/workflows/forum-container-checks.yml"

permissions:
  contents: read

jobs:
  forum-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout forum workspace only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            forum
          fetch-depth: 1

      - name: Build forum container image
        run: docker build -t fabushi-forum ./forum

      - name: Start forum container in sqlite read-only mode
        run: |
          docker run -d --rm --name fabushi-forum-check-readonly \
            -e FORUM_DATA_SOURCE=sqlite \
            -e FORUM_DATABASE_URL=file:/tmp/forum-readonly.db \
            -p 3000:3000 \
            fabushi-forum

      - name: Wait for forum sqlite read-only container healthcheck
        run: |
          for attempt in 1 2 3 4 5 6; do
            container_health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' fabushi-forum-check-readonly)"

            if [ "$container_health" = "healthy" ]; then
              break
            fi

            if [ "$container_health" = "unhealthy" ]; then
              docker logs fabushi-forum-check-readonly
              exit 1
            fi

            sleep 3
          done

          if [ "${container_health:-}" != "healthy" ]; then
            docker logs fabushi-forum-check-readonly
            exit 1
          fi

      - name: Smoke test forum sqlite health and status endpoints default to read-only
        run: |
          health_response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/health)"
          echo "$health_response"
          FORUM_HEALTH_RESPONSE="$health_response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_HEALTH_RESPONSE"])
          assert payload["service"] == "forum", payload
          assert payload["ready"] is True, payload
          assert payload["dataSource"] == "sqlite", payload
          assert payload["persistenceMode"] == "sqlite-file", payload
          assert payload["deploymentStage"] == "preview", payload
          assert payload["indexingEnabled"] is False, payload
          assert payload["publicBaseUrlConfigured"] is False, payload
          assert payload["writesEnabled"] is False, payload
          assert payload["requiresAccessCode"] is False, payload
          PY

          response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/status)"
          echo "$response"
          FORUM_STATUS_RESPONSE="$response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_STATUS_RESPONSE"])
          assert payload["service"] == "forum", payload
          assert payload["dataSource"] == "sqlite", payload
          assert payload["persistenceMode"] == "sqlite-file", payload
          assert payload["deploymentStage"] == "preview", payload
          assert payload["indexingEnabled"] is False, payload
          assert payload["writesEnabled"] is False, payload
          assert payload["requiresAccessCode"] is False, payload
          assert payload["counts"]["threads"] >= 4, payload
          assert payload["counts"]["moderationEvents"] >= 4, payload
          PY

      - name: Smoke test forum sqlite read-only page surfaces
        run: |
          new_thread_page="$(curl --fail --show-error --silent http://127.0.0.1:3000/threads/new)"
          FORUM_NEW_THREAD_PAGE="$new_thread_page" python3 - <<'PY'
          import os
          from html import unescape

          html = unescape(os.environ["FORUM_NEW_THREAD_PAGE"])
          assert "发起一条最小主题" in html, html[:1000]
          assert "当前数据源：sqlite / 只读" in html, html[:1500]
          assert "FORUM_ENABLE_WRITES=true" in html, html[:2500]
          PY

          status_code="$(curl --silent --show-error --output /tmp/forum-readonly-create.json --write-out '%{http_code}' http://127.0.0.1:3000/api/threads \
            -H 'content-type: application/json' \
            --data '{
              "sectionSlug": "newcomer-path",
              "title": "只读容器检查：不应默认开放新主题",
              "author": "只读检查用户",
              "authorRoleLabel": "新手观察者",
              "guidanceSignal": "确认 sqlite 默认不开放写入。",
              "summary": "用于验证 sqlite 在默认部署态下仍然拒绝创建主题。",
              "tags": ["只读检查"],
              "openingPost": ["这条请求应该被显式拒绝，而不是直接写入 sqlite。"]
            }')"

          if [ "$status_code" != "503" ]; then
            cat /tmp/forum-readonly-create.json
            exit 1
          fi

          FORUM_CREATE_ERROR_BODY="$(cat /tmp/forum-readonly-create.json)" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_CREATE_ERROR_BODY"])
          assert "FORUM_ENABLE_WRITES=true" in payload["error"], payload
          PY

      - name: Smoke test forum preview deployment headers and robots contract
        run: |
          response_headers="$(curl --silent --show-error --dump-header - --output /dev/null http://127.0.0.1:3000/threads)"
          echo "$response_headers"
          FORUM_HEADERS="$response_headers" python3 - <<'PY'
          import os

          headers = os.environ["FORUM_HEADERS"].lower()
          assert "x-forum-deployment-stage: preview" in headers, headers
          assert "x-forum-indexing-enabled: false" in headers, headers
          assert "x-robots-tag: noindex, nofollow, noarchive" in headers, headers
          PY

          robots_response="$(curl --fail --show-error --silent http://127.0.0.1:3000/robots.txt)"
          echo "$robots_response"
          FORUM_ROBOTS_RESPONSE="$robots_response" python3 - <<'PY'
          import os

          payload = os.environ["FORUM_ROBOTS_RESPONSE"]
          assert "User-Agent: *" in payload, payload
          assert "Disallow: /" in payload, payload
          PY

      - name: Stop forum sqlite read-only container
        if: always()
        run: docker stop fabushi-forum-check-readonly || true

      - name: Prepare persistent sqlite workspace
        run: |
          rm -rf /tmp/fabushi-forum-data
          mkdir -p /tmp/fabushi-forum-data

      - name: Start forum container in sqlite writable preview mode
        run: |
          docker run -d --rm --name fabushi-forum-check \
            -v /tmp/fabushi-forum-data:/data \
            -e FORUM_DATA_SOURCE=sqlite \
            -e FORUM_ENABLE_WRITES=true \
            -e FORUM_WRITE_ACCESS_CODE=forum-preview-2026 \
            -e FORUM_DATABASE_URL=file:/data/forum.db \
            -p 3000:3000 \
            fabushi-forum

      - name: Wait for forum sqlite writable preview container healthcheck
        run: |
          for attempt in 1 2 3 4 5 6; do
            container_health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' fabushi-forum-check)"

            if [ "$container_health" = "healthy" ]; then
              break
            fi

            if [ "$container_health" = "unhealthy" ]; then
              docker logs fabushi-forum-check
              exit 1
            fi

            sleep 3
          done

          if [ "${container_health:-}" != "healthy" ]; then
            docker logs fabushi-forum-check
            exit 1
          fi

      - name: Smoke test forum writable sqlite health and status endpoints
        run: |
          health_response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/health)"
          echo "$health_response"
          FORUM_HEALTH_RESPONSE="$health_response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_HEALTH_RESPONSE"])
          assert payload["service"] == "forum", payload
          assert payload["ready"] is True, payload
          assert payload["dataSource"] == "sqlite", payload
          assert payload["persistenceMode"] == "sqlite-file", payload
          assert payload["deploymentStage"] == "preview", payload
          assert payload["indexingEnabled"] is False, payload
          assert payload["publicBaseUrlConfigured"] is False, payload
          assert payload["writesEnabled"] is True, payload
          assert payload["requiresAccessCode"] is True, payload
          PY

          response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/status)"
          echo "$response"
          FORUM_STATUS_RESPONSE="$response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_STATUS_RESPONSE"])
          assert payload["service"] == "forum", payload
          assert payload["dataSource"] == "sqlite", payload
          assert payload["persistenceMode"] == "sqlite-file", payload
          assert payload["deploymentStage"] == "preview", payload
          assert payload["indexingEnabled"] is False, payload
          assert payload["writesEnabled"] is True, payload
          assert payload["requiresAccessCode"] is True, payload
          assert payload["counts"]["threads"] >= 4, payload
          assert payload["counts"]["moderationEvents"] >= 4, payload
          PY

      - name: Smoke test forum writable page surfaces
        run: |
          new_thread_page="$(curl --fail --show-error --silent http://127.0.0.1:3000/threads/new)"
          FORUM_NEW_THREAD_PAGE="$new_thread_page" python3 - <<'PY'
          import os
          from html import unescape

          html = unescape(os.environ["FORUM_NEW_THREAD_PAGE"])
          assert "发起一条最小主题" in html, html[:1000]
          assert "当前数据源：sqlite / 可写" in html, html[:1200]
          assert "写入口令" in html, html[:2200]
          assert "小范围内测" in html, html[:2600]
          PY

      - name: Smoke test forum thread creation endpoint
        run: |
          denied_status="$(curl --silent --show-error --output /tmp/forum-write-denied.json --write-out '%{http_code}' http://127.0.0.1:3000/api/threads \
            -H 'content-type: application/json' \
            --data '{
              "sectionSlug": "newcomer-path",
              "title": "容器页面检查：缺少口令时不应写入",
              "author": "页面检查用户",
              "authorRoleLabel": "新手观察者",
              "guidanceSignal": "先验证写入口令确实生效。",
              "summary": "想确认内测写入口令缺失时，sqlite 不会直接接收新主题。",
              "tags": ["页面检查", "sqlite"],
              "openingPost": ["这条请求应该先被 preview gate 拒绝。"]
            }')"

          if [ "$denied_status" != "403" ]; then
            cat /tmp/forum-write-denied.json
            exit 1
          fi

          FORUM_CREATE_DENIED_BODY="$(cat /tmp/forum-write-denied.json)" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_CREATE_DENIED_BODY"])
          assert "write access code" in payload["error"], payload
          PY

          response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/threads \
            -H 'content-type: application/json' \
            --data '{
              "sectionSlug": "newcomer-path",
              "title": "容器页面检查：新主题能否进入真实帖子页？",
              "author": "页面检查用户",
              "authorRoleLabel": "新手观察者",
              "guidanceSignal": "请先补一条最容易开始的下一步建议。",
              "writeAccessCode": "forum-preview-2026",
              "summary": "想确认 sqlite 新主题创建后，列表页和详情页都会回读到最新内容。",
              "tags": ["页面检查", "sqlite"],
              "openingPost": ["这条主题由容器页面检查创建，用来确认论坛页面层也能读到刚写入的新线程。"]
            }')"

          echo "$response"
          FORUM_CREATE_RESPONSE="$response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_CREATE_RESPONSE"])
          assert payload["source"] == "sqlite", payload
          assert payload["thread"]["sectionSlug"] == "newcomer-path", payload
          assert payload["thread"]["title"].startswith("容器页面检查"), payload
          assert payload["thread"]["authorRoleLabel"] == "新手观察者", payload
          assert payload["thread"]["guidanceSignal"] == "请先补一条最容易开始的下一步建议。", payload
          assert payload["thread"]["openingPost"], payload
          assert payload["moderationEvents"][-1]["eventType"] == "thread-created", payload
          assert "新主题已发布" in payload["moderationEvents"][-1]["summary"], payload
          print(payload["thread"]["slug"])
          PY

          slug="$(FORUM_CREATE_RESPONSE="$response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_CREATE_RESPONSE"])
          print(payload["thread"]["slug"])
          PY
          )"

          detail="$(curl --fail --show-error --silent "http://127.0.0.1:3000/api/thread/${slug}")"
          echo "$detail"
          FORUM_DETAIL_RESPONSE="$detail" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_DETAIL_RESPONSE"])
          assert payload["source"] == "sqlite", payload
          assert payload["thread"]["slug"], payload
          assert payload["thread"]["author"] == "页面检查用户", payload
          assert payload["thread"]["authorRoleLabel"] == "新手观察者", payload
          assert payload["thread"]["guidanceSignal"] == "请先补一条最容易开始的下一步建议。", payload
          assert payload["moderationEvents"][-1]["eventType"] == "thread-created", payload
          PY

          thread_list_page="$(curl --fail --show-error --silent http://127.0.0.1:3000/threads)"
          FORUM_THREAD_LIST_PAGE="$thread_list_page" python3 - <<'PY'
          import os
          from html import unescape

          html = unescape(os.environ["FORUM_THREAD_LIST_PAGE"])
          assert "发起主题" in html, html[:1000]
          assert "容器页面检查：新主题能否进入真实帖子页？" in html, html[:3000]
          assert "页面检查用户" in html, html[:3000]
          assert "新手观察者" in html, html[:3000]
          assert "请先补一条最容易开始的下一步建议。" in html, html[:4000]
          PY

          thread_detail_page="$(curl --fail --show-error --silent "http://127.0.0.1:3000/threads/${slug}")"
          FORUM_THREAD_DETAIL_PAGE="$thread_detail_page" python3 - <<'PY'
          import os
          from html import unescape

          html = unescape(os.environ["FORUM_THREAD_DETAIL_PAGE"])
          assert "容器页面检查：新主题能否进入真实帖子页？" in html, html[:2500]
          assert "页面检查用户" in html, html[:2500]
          assert "新手观察者" in html, html[:2500]
          assert "请先补一条最容易开始的下一步建议。" in html, html[:3500]
          assert "写一条最小回复" in html, html[:2500]
          assert "写入口令" in html, html[:3500]
          assert "审核时间线" in html, html[:4000]
          assert "新主题已发布" in html, html[:4500]
          PY

          echo "thread_slug=${slug}" >> "$GITHUB_ENV"

      - name: Smoke test forum reply creation endpoint
        run: |
          response="$(curl --fail --show-error --silent "http://127.0.0.1:3000/api/thread/${thread_slug}/replies" \
            -H 'content-type: application/json' \
            --data '{
              "author": "页面回复检查",
              "roleLabel": "页面回读验证",
              "guidanceSignal": "请优先补一条最容易执行的下一步建议。",
              "writeAccessCode": "forum-preview-2026",
              "trustSignal": "用于确认 sqlite 回复写入后，线程详情页会显示新回复。",
              "body": ["这条回复由页面检查写入，用来确认 forum 页面详情已经能回读最新回复。"]
            }')"

          echo "$response"
          FORUM_REPLY_RESPONSE="$response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_REPLY_RESPONSE"])
          assert payload["source"] == "sqlite", payload
          assert payload["thread"]["slug"] == os.environ["thread_slug"], payload
          assert payload["thread"]["replyCount"] >= 1, payload
          assert payload["thread"]["lastActivity"] == "刚刚回复", payload
          assert payload["replies"][-1]["author"] == "页面回复检查", payload
          assert payload["replies"][-1]["roleLabel"] == "页面回读验证", payload
          assert payload["replies"][-1]["guidanceSignal"] == "请优先补一条最容易执行的下一步建议。", payload
          assert payload["replies"][-1]["body"], payload
          assert payload["moderationEvents"][-1]["eventType"] == "reply-created", payload
          assert "新回复已写入时间线" in payload["moderationEvents"][-1]["summary"], payload
          PY

          thread_detail_page="$(curl --fail --show-error --silent "http://127.0.0.1:3000/threads/${thread_slug}")"
          FORUM_THREAD_DETAIL_PAGE="$thread_detail_page" python3 - <<'PY'
          import os
          from html import unescape

          html = unescape(os.environ["FORUM_THREAD_DETAIL_PAGE"])
          assert "当前回复" in html, html[:2000]
          assert "页面回复检查" in html, html[:4500]
          assert "页面回读验证" in html, html[:4500]
          assert "请优先补一条最容易执行的下一步建议。" in html, html[:5000]
          assert "这条回复由页面检查写入，用来确认 forum 页面详情已经能回读最新回复。" in html, html[:5000]
          assert "新回复已写入时间线" in html, html[:5500]
          PY

      - name: Restart forum container with same sqlite volume
        run: |
          docker stop fabushi-forum-check
          docker run -d --rm --name fabushi-forum-check-restart \
            -v /tmp/fabushi-forum-data:/data \
            -e FORUM_DATA_SOURCE=sqlite \
            -e FORUM_ENABLE_WRITES=true \
            -e FORUM_WRITE_ACCESS_CODE=forum-preview-2026 \
            -e FORUM_DATABASE_URL=file:/data/forum.db \
            -p 3000:3000 \
            fabushi-forum

      - name: Wait for forum restarted sqlite preview container healthcheck
        run: |
          for attempt in 1 2 3 4 5 6; do
            container_health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' fabushi-forum-check-restart)"

            if [ "$container_health" = "healthy" ]; then
              break
            fi

            if [ "$container_health" = "unhealthy" ]; then
              docker logs fabushi-forum-check-restart
              exit 1
            fi

            sleep 3
          done

          if [ "${container_health:-}" != "healthy" ]; then
            docker logs fabushi-forum-check-restart
            exit 1
          fi

      - name: Smoke test forum sqlite data survives container restart
        run: |
          health_response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/health)"
          echo "$health_response"
          FORUM_HEALTH_RESPONSE="$health_response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_HEALTH_RESPONSE"])
          assert payload["service"] == "forum", payload
          assert payload["ready"] is True, payload
          assert payload["dataSource"] == "sqlite", payload
          assert payload["persistenceMode"] == "sqlite-file", payload
          assert payload["deploymentStage"] == "preview", payload
          assert payload["indexingEnabled"] is False, payload
          assert payload["publicBaseUrlConfigured"] is False, payload
          assert payload["writesEnabled"] is True, payload
          assert payload["requiresAccessCode"] is True, payload
          PY

          response="$(curl --fail --show-error --silent http://127.0.0.1:3000/api/status)"
          echo "$response"
          FORUM_RESTART_STATUS_RESPONSE="$response" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_RESTART_STATUS_RESPONSE"])
          assert payload["service"] == "forum", payload
          assert payload["dataSource"] == "sqlite", payload
          assert payload["persistenceMode"] == "sqlite-file", payload
          assert payload["deploymentStage"] == "preview", payload
          assert payload["indexingEnabled"] is False, payload
          assert payload["writesEnabled"] is True, payload
          assert payload["requiresAccessCode"] is True, payload
          assert payload["counts"]["threads"] >= 5, payload
          assert payload["counts"]["moderationEvents"] >= 6, payload
          PY

          detail="$(curl --fail --show-error --silent "http://127.0.0.1:3000/api/thread/${thread_slug}")"
          echo "$detail"
          FORUM_RESTART_DETAIL_RESPONSE="$detail" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["FORUM_RESTART_DETAIL_RESPONSE"])
          assert payload["source"] == "sqlite", payload
          assert payload["thread"]["slug"] == os.environ["thread_slug"], payload
          assert payload["thread"]["author"] == "页面检查用户", payload
          assert payload["thread"]["authorRoleLabel"] == "新手观察者", payload
          assert payload["thread"]["guidanceSignal"] == "请先补一条最容易开始的下一步建议。", payload
          assert payload["replies"][-1]["author"] == "页面回复检查", payload
          assert payload["replies"][-1]["roleLabel"] == "页面回读验证", payload
          assert payload["replies"][-1]["guidanceSignal"] == "请优先补一条最容易执行的下一步建议。", payload
          assert payload["moderationEvents"][-1]["eventType"] == "reply-created", payload
          assert "新回复已写入时间线" in payload["moderationEvents"][-1]["summary"], payload
          PY

          thread_detail_page="$(curl --fail --show-error --silent "http://127.0.0.1:3000/threads/${thread_slug}")"
          FORUM_RESTART_THREAD_DETAIL_PAGE="$thread_detail_page" python3 - <<'PY'
          import os
          from html import unescape

          html = unescape(os.environ["FORUM_RESTART_THREAD_DETAIL_PAGE"])
          assert "容器页面检查：新主题能否进入真实帖子页？" in html, html[:2500]
          assert "页面回复检查" in html, html[:5000]
          assert "页面回读验证" in html, html[:5000]
          assert "新回复已写入时间线" in html, html[:5500]
          PY

      - name: Stop forum containers
        if: always()
        run: |
          docker stop fabushi-forum-check || true
          docker stop fabushi-forum-check-readonly || true
          docker stop fabushi-forum-check-restart || true
