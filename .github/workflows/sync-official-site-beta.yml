name: Sync official site beta download state

on:
  workflow_run:
    workflows:
      - Publish CD packages to GitHub Release
    types:
      - completed
    branches:
      - main
  release:
    types:
      - published
      - edited
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to sync into the official site beta channel. (Leave empty to sync the latest release)
        required: false
        type: string

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  sync-beta-state:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run' || github.event.release.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_RELEASE_TAG:-${EVENT_RELEASE_TAG:-}}"

          if [ -z "$release_tag" ]; then
            echo "No explicit tag provided, fetching latest release..."
            latest_release="$(gh api repos/$RELEASE_REPO/releases/latest --jq .tag_name 2>/dev/null || true)"
            if [ -n "$latest_release" ]; then
              release_tag="$latest_release"
            fi
          fi

          if [ -z "$release_tag" ]; then
            echo "No release tag was provided or detected." >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow helper scripts
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**

      - name: Generate beta state asset for the official site
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          IOS_TESTFLIGHT_PUBLIC_URL: ${{ vars.IOS_TESTFLIGHT_PUBLIC_URL || '' }}
          OFFICIAL_SITE_GITHUB_MIRROR_BASES: ${{ vars.OFFICIAL_SITE_GITHUB_MIRROR_BASES || '' }}
        run: python3 .github/scripts/generate-official-site-beta-state.py

      - name: Upload beta state asset to the release
        id: upload_state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
        run: |
          set -euo pipefail
          upload_log="$(mktemp)"
          if gh release upload "$RELEASE_TAG" OFFICIAL_SITE_RELEASE_STATE.json --repo "$RELEASE_REPO" --clobber 2>"$upload_log"; then
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
            echo "immutable_release=false" >> "$GITHUB_OUTPUT"
            rm -f "$upload_log"
            exit 0
          fi

          if grep -q 'Cannot upload assets to an immutable release' "$upload_log"; then
            cat "$upload_log"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            echo "immutable_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release $RELEASE_TAG is immutable, so OFFICIAL_SITE_RELEASE_STATE.json was not uploaded. The official site will keep using release metadata and TestFlight status fallbacks."
            rm -f "$upload_log"
            exit 0
          fi

          cat "$upload_log" >&2
          rm -f "$upload_log"
          exit 1

      - name: Copy generated file to a safe location before checkout
        shell: bash
        run: |
          mkdir -p $RUNNER_TEMP/sync-beta-state
          cp OFFICIAL_SITE_RELEASE_STATE.json $RUNNER_TEMP/sync-beta-state/

      - name: Push beta state to official site repo
        id: push_state
        if: steps.upload_state.outcome == 'success'
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.OFFICIAL_SITE_RELEASE_PAT || github.token }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**
            /frontend/apps/web/public/api/**

      - name: Copy state to public API and commit
        id: commit_state
        if: steps.push_state.outcome == 'success'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -f $RUNNER_TEMP/sync-beta-state/OFFICIAL_SITE_RELEASE_STATE.json ]; then
            cp $RUNNER_TEMP/sync-beta-state/OFFICIAL_SITE_RELEASE_STATE.json OFFICIAL_SITE_RELEASE_STATE.json
            echo "Restored generated file from RUNNER_TEMP"
          else
            gh release download "$RELEASE_TAG" --pattern OFFICIAL_SITE_RELEASE_STATE.json --repo ${{ github.repository }} --dir .
          fi

          if [ ! -f OFFICIAL_SITE_RELEASE_STATE.json ]; then
            echo "::error::OFFICIAL_SITE_RELEASE_STATE.json could not be restored or downloaded."
            exit 1
          fi

          mkdir -p frontend/apps/web/public/api
          python3 .github/scripts/merge-official-site-beta-state.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/apps/web/public/api/releases.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "push_blocked_by_repo_rules=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync beta release state for $RELEASE_TAG"

          push_log="$(mktemp)"
          if git push origin main 2>"$push_log"; then
            echo "push_blocked_by_repo_rules=false" >> "$GITHUB_OUTPUT"
            rm -f "$push_log"
            exit 0
          fi

          if grep -q 'GH013: Repository rule violations found' "$push_log" && grep -q 'Changes must be made through the merge queue' "$push_log"; then
            cat "$push_log"
            echo "push_blocked_by_repo_rules=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping direct push to main because repository rules require the merge queue. The official site will keep falling back to release metadata and TESTFLIGHT_UPLOAD_STATUS.txt fallbacks."
            rm -f "$push_log"
            exit 0
          fi

          cat "$push_log" >&2
          rm -f "$push_log"
          exit 1

      - name: Write summary
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          RELEASE_STATE_UPLOADED: ${{ steps.upload_state.outputs.uploaded }}
          IMMUTABLE_RELEASE: ${{ steps.upload_state.outputs.immutable_release }}
          PUSH_BLOCKED_BY_REPO_RULES: ${{ steps.commit_state.outputs.push_blocked_by_repo_rules }}
        run: |
          {
            echo "## Official site beta state synced"
            echo ""
            echo "- Release tag: $RELEASE_TAG"
            if [ "$RELEASE_STATE_UPLOADED" = "true" ]; then
              echo "- Asset: OFFICIAL_SITE_RELEASE_STATE.json uploaded to the GitHub Release"
            elif [ "$IMMUTABLE_RELEASE" = "true" ]; then
              echo "- Asset upload skipped because the GitHub Release is immutable"
              echo "- Official site fallback remains available through release metadata and TESTFLIGHT_UPLOAD_STATUS.txt"
            else
              echo "- Asset: OFFICIAL_SITE_RELEASE_STATE.json was generated locally"
            fi
            if [ "$PUSH_BLOCKED_BY_REPO_RULES" = "true" ]; then
              echo "- Repository rules blocked the direct push to main, so /api/releases.json was not committed automatically"
              echo "- The official site will keep falling back to release metadata and TESTFLIGHT_UPLOAD_STATUS.txt"
            fi
            echo "- Available beta channels from this release were synced selectively."
            echo "- If a release only contains one platform, the official site keeps the previous entry for the other platform."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-beta-sync-failure:
    name: Notify official site beta sync failure
    needs:
      - sync-beta-state
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout failure notifier
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**

      - name: Create or update official site beta sync failure issue
        uses: actions/github-script@v8
        env:
          SOURCE_SHA: ${{ github.event.release.target_commitish || github.sha }}
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || '' }}
        with:
          script: |
            const { createOrUpdateFailureIssue } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await createOrUpdateFailureIssue({
              github,
              context,
              core,
              kind: 'official site beta sync',
              titlePrefix: 'Official site beta sync failed for',
              sourceSha: process.env.SOURCE_SHA || context.sha,
              sourceRef: 'release',
              labelName: 'release-failure',
              labelColor: 'b60205',
              labelDescription: 'Official site release sync failed',
              notifyJobName: 'Notify official site beta sync failure',
              extraSections: [
                '### Official site impact',
                '',
                '- Android beta 下载入口不会自动切到最新发布版本 APK。',
                '- iOS TestFlight 状态不会自动同步到官网。',
                '- 官网“这次更新了什么”和国内镜像下载入口也不会随本次 release 刷新。',
                '',
                '### Release context',
                '',
                `- Release tag: ${process.env.RELEASE_TAG || 'unknown'}`,
                '- Check whether the selected release contains an APK asset and TESTFLIGHT_UPLOAD_STATUS.txt when iOS beta should be updated.',
                '- Check whether IOS_TESTFLIGHT_PUBLIC_URL or OFFICIAL_SITE_GITHUB_MIRROR_BASES variables are malformed when the sync script fails during metadata generation.',
              ],
            });
