name: CD - Staging API gated production deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_sha:
        description: Commit SHA to deploy. Leave empty to deploy the current default-branch SHA.
        required: false
        type: string

concurrency:
  group: cd-production-main
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  deployments: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-artifact:
    name: Build release artifact
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: fabushi
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      deploy_changed: ${{ steps.deploy-changes.outputs.deploy_changed }}
    steps:
      - name: Resolve source commit
        id: source
        working-directory: .
        env:
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            source_sha="${{ github.event.workflow_run.head_sha }}"
          elif [ -n "${INPUT_SOURCE_SHA:-}" ]; then
            source_sha="$INPUT_SOURCE_SHA"
          else
            source_sha="${{ github.sha }}"
          fi
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved source SHA: $source_sha"

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.source.outputs.source_sha }}
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**
            /.github/workflows/**
            /.github/scripts/**

      - name: Detect deploy-relevant changes
        id: deploy-changes
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail

          changed_files="changed-files.txt"
          if git rev-parse "$SOURCE_SHA^" >/dev/null 2>&1; then
            git diff --name-only "$SOURCE_SHA^" "$SOURCE_SHA" > "$changed_files"
          else
            git diff-tree --root --no-commit-id --name-only -r "$SOURCE_SHA" > "$changed_files"
          fi

          deploy_changed=false
          reasons=()

          mark_deploy() {
            deploy_changed=true
            reasons+=("$1")
          }

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              fabushi/lib/*|fabushi/assets/*|fabushi/fonts/*|fabushi/pubspec.yaml|fabushi/pubspec.lock|fabushi/analysis_options.yaml|fabushi/l10n.yaml)
                mark_deploy "shared Flutter deploy input changed: $path"
                ;;
              fabushi/android/*|fabushi/ios/*)
                mark_deploy "mobile platform input changed and should keep deploy artifact honest: $path"
                ;;
              fabushi/web/*|fabushi/e2e/*)
                mark_deploy "worker runtime or staging gate input changed: $path"
                ;;
              .github/workflows/deploy-production.yml|.github/scripts/*)
                mark_deploy "deployment pipeline input changed: $path"
                ;;
            esac
          done < "$changed_files"

          echo "deploy_changed=$deploy_changed" >> "$GITHUB_OUTPUT"

          {
            echo "## Deploy change detection"
            echo ""
            echo "- Source SHA: $SOURCE_SHA"
            echo "- Deploy changed: $deploy_changed"
            echo ""
            echo "### Reasons"
            echo ""
            if [ "${#reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${reasons[@]}" | awk '!seen[$0]++ { printf "- `%s`\n", $0 }'
            else
              echo "- No deploy-relevant inputs changed. This CD run will stop before artifact build and environment deploy steps."
            fi
            echo ""
            echo "### Changed files"
            echo ""
            sed 's/^/- `/' "$changed_files" | sed 's/$/`/' || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip deploy build when inputs are unchanged
        if: steps.deploy-changes.outputs.deploy_changed != 'true'
        shell: bash
        run: |
          echo "No deploy-relevant inputs changed; skipping release artifact build and downstream environment deploy jobs."

      - name: Set up Flutter
        if: steps.deploy-changes.outputs.deploy_changed == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        if: steps.deploy-changes.outputs.deploy_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run profile update D1 transaction regression
        if: steps.deploy-changes.outputs.deploy_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > web/package.json
          node web/tests/profile.test.js

      - name: Build Flutter web release
        if: steps.deploy-changes.outputs.deploy_changed == 'true'
        run: |
          flutter pub get
          flutter build web --release

      - name: Package release artifact
        if: steps.deploy-changes.outputs.deploy_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../release-artifact/fabushi/build
          mkdir -p ../release-artifact/github-scripts
          cp -R build/web ../release-artifact/fabushi/build/web
          cp -R web ../release-artifact/fabushi/web
          cp -R ../.github/scripts/. ../release-artifact/github-scripts
          find ../release-artifact/fabushi/web -path '*/assets/built_in/*' -prune -exec rm -rf {} + || true
          printf '%s\n' "${{ steps.source.outputs.source_sha }}" > ../release-artifact/SOURCE_SHA

      - name: Upload release artifact
        if: steps.deploy-changes.outputs.deploy_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: fabushi-release-${{ steps.source.outputs.source_sha }}
          path: release-artifact
          retention-days: 30
          if-no-files-found: error

  deploy-staging:
    name: Deploy staging environment
    needs: build-artifact
    if: needs.build-artifact.outputs.deploy_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: development
      url: https://fabushi-flutter-web-dev.bhrumom.workers.dev
    defaults:
      run:
        working-directory: release-artifact/fabushi/web
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v5
        with:
          name: fabushi-release-${{ needs.build-artifact.outputs.source_sha }}
          path: release-artifact

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check Cloudflare credential presence
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: |
          set -euo pipefail
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo "Cloudflare token configured: yes" || echo "Cloudflare token configured: no"
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo "Cloudflare account id configured: yes" || echo "Cloudflare account id configured: no"
          [ -n "${CLOUDFLARE_EMAIL:-}" ] && echo "Cloudflare email configured: yes" || echo "Cloudflare email configured: no"

      - name: Patch development D1 database id
        shell: bash
        env:
          DEVELOPMENT_D1_DATABASE_ID: ${{ vars.DEVELOPMENT_D1_DATABASE_ID || vars.D1_DATABASE_ID || vars.CLOUDFLARE_D1_DATABASE_ID || '7b6318f0-fbc2-42f9-9887-85f878ae76d0' }}
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          from pathlib import Path
          import os
          path = Path('wrangler.toml')
          text = path.read_text()
          replacement = os.environ['DEVELOPMENT_D1_DATABASE_ID']
          if 'YOUR_DEV_DATABASE_ID' in text:
              text = text.replace('YOUR_DEV_DATABASE_ID', replacement)
              path.write_text(text)
              print('Patched development D1 database id placeholder')
          else:
              print('Development D1 database id placeholder not present')
          PY2

      - name: Apply development D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CF_EMAIL || vars.CLOUDFLARE_EMAIL }}
        run: bash ../../github-scripts/run-wrangler-d1-migrations.sh DB development

      - name: Deploy staging Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL }}
        run: npx --yes wrangler@latest deploy --env development

  staging-e2e:
    name: Staging API E2E and smoke gate
    needs:
      - build-artifact
      - deploy-staging
    if: needs.build-artifact.outputs.deploy_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: fabushi/e2e
    env:
      STAGING_API_URL: https://fabushi-flutter-web-dev.bhrumom.workers.dev
      STAGING_APP_URL: ${{ vars.STAGING_APP_URL || 'https://fabushi-flutter-web-dev.bhrumom.workers.dev' }}
      STAGING_TEST_LOGIN: ${{ secrets.STAGING_TEST_LOGIN }}
      STAGING_TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}
      STAGING_TEST_EMAIL: ${{ vars.STAGING_TEST_EMAIL }}
      STAGING_TEST_PHONE: ${{ vars.STAGING_TEST_PHONE }}
      STAGING_SOCIAL_TARGET_USERNAME: ${{ vars.STAGING_SOCIAL_TARGET_USERNAME }}
    steps:
      - name: Checkout E2E files
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.build-artifact.outputs.source_sha }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/e2e/**

      - name: Check staging E2E configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in STAGING_API_URL STAGING_APP_URL STAGING_TEST_LOGIN STAGING_TEST_PASSWORD STAGING_TEST_EMAIL STAGING_TEST_PHONE; do
            if [ -z "${!name:-}" ]; then
              echo "$name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm ci

      - name: Run staging profile API E2E
        run: npm test

      - name: Run staging smoke test
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$STAGING_API_URL/health" > /tmp/staging-health.json
          test -s /tmp/staging-health.json
          status=$(curl -sS -o /tmp/staging-auth.json -w '%{http_code}' "$STAGING_API_URL/api/auth/user-info")
          if [ "$status" != "401" ] && [ "$status" != "403" ]; then
            echo "Expected unauthenticated user-info to return 401 or 403, got $status"
            cat /tmp/staging-auth.json
            exit 1
          fi

      - name: Upload staging E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-api-e2e-playwright-report
          path: fabushi/e2e/playwright-report
          if-no-files-found: ignore

      - name: Upload staging E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-api-e2e-test-results
          path: fabushi/e2e/test-results
          if-no-files-found: ignore

  deploy-production:
    name: Deploy production environment
    needs:
      - build-artifact
      - staging-e2e
    if: needs.build-artifact.outputs.deploy_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.PRODUCTION_API_URL || 'https://api.ombhrum.com' }}
    defaults:
      run:
        working-directory: release-artifact/fabushi/web
    steps:
      - name: Download validated release artifact
        uses: actions/download-artifact@v5
        with:
          name: fabushi-release-${{ needs.build-artifact.outputs.source_sha }}
          path: release-artifact

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check production Cloudflare credential presence
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: |
          set -euo pipefail
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo "Cloudflare token configured: yes" || echo "Cloudflare token configured: no"
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo "Cloudflare account id configured: yes" || echo "Cloudflare account id configured: no"
          [ -n "${CLOUDFLARE_EMAIL:-}" ] && echo "Cloudflare email configured: yes" || echo "Cloudflare email configured: no"

      - name: Disable production route mutation in CI
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          from pathlib import Path
          import re

          path = Path('wrangler.toml')
          text = path.read_text()
          pattern = re.compile(
              r'(?ms)^(\[env\.production\]\nname = "fabushi-flutter-web-prod"\n)(?:routes = \[\n(?:  .*\n)+?\]\n)?(workers_dev = false\n)'
          )
          replacement = (
              '[env.production]\n'
              'name = "fabushi-flutter-web-prod"\n'
              '# Route is pre-provisioned in Cloudflare; CI deploys code/assets only.\n'
              'workers_dev = false\n'
          )
          new_text, count = pattern.subn(replacement, text, count=1)
          if count == 0:
              raise SystemExit('Could not locate [env.production] block in wrangler.toml')

          production_section = new_text.split('[env.production]\n', 1)[1].split('\n[[env.production.', 1)[0]
          if 'routes =' in production_section:
              raise SystemExit('Production routes still present after patch')

          if new_text != text:
              path.write_text(new_text)
              print('Removed production route management from CI deploy artifact')
          else:
              print('Production route management already absent')

          print('Verified production deploy artifact no longer mutates routes')
          PY2

      - name: Apply production D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CF_EMAIL || vars.CLOUDFLARE_EMAIL }}
        run: bash ../../github-scripts/run-wrangler-d1-migrations.sh DB production

      - name: Deploy production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: npx --yes wrangler@latest deploy --env production

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Production deployment"
            echo ""
            echo "- Source SHA: ${{ needs.build-artifact.outputs.source_sha }}"
            echo "- Artifact: fabushi-release-${{ needs.build-artifact.outputs.source_sha }}"
            echo "- Gates: staging API E2E, staging API smoke"
            echo "- URL: ${{ vars.PRODUCTION_API_URL || 'https://api.ombhrum.com' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  production-smoke:
    name: Production smoke test
    needs:
      - build-artifact
      - deploy-production
    if: needs.build-artifact.outputs.deploy_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL || 'https://api.ombhrum.com' }}
    steps:
      - name: Smoke test production API health and auth boundary
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$PRODUCTION_API_URL/health" > /tmp/production-health.json
          test -s /tmp/production-health.json
          status=$(curl -sS -o /tmp/production-auth.json -w '%{http_code}' "$PRODUCTION_API_URL/api/auth/user-info")
          if [ "$status" != "401" ] && [ "$status" != "403" ]; then
            echo "Expected unauthenticated user-info to return 401 or 403, got $status"
            cat /tmp/production-auth.json
            exit 1
          fi

      - name: Write production smoke summary
        shell: bash
        run: |
          {
            echo "## Production smoke test passed"
            echo ""
            echo "- Source SHA: ${{ needs.build-artifact.outputs.source_sha }}"
            echo "- URL: $PRODUCTION_API_URL"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: Notify deployment failure
    needs:
      - build-artifact
      - deploy-staging
      - staging-e2e
      - deploy-production
      - production-smoke
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout failure notifier
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**

      - name: Create or update detailed CD failure issue
        uses: actions/github-script@v8
        env:
          SOURCE_SHA: ${{ needs.build-artifact.outputs.source_sha || github.event.workflow_run.head_sha || github.sha }}
        with:
          script: |
            const { createOrUpdateFailureIssue } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await createOrUpdateFailureIssue({
              github,
              context,
              core,
              kind: 'CD',
              titlePrefix: 'CD failed for',
              sourceSha: process.env.SOURCE_SHA || context.sha,
              sourceRef: 'main',
              labelName: 'deployment-failure',
              labelColor: 'ededed',
              labelDescription: 'Production deployment workflow failed',
              notifyJobName: 'Notify deployment failure',
              extraSections: [
                '### Deployment gates',
                '',
                '- Detect deploy-relevant changes before building artifacts',
                '- Staging API E2E',
                '- Staging API smoke test',
                '- Production deploy and API smoke test',
                '',
                '### Rollback',
                '',
                'Use Cloudflare Workers deployment history to roll back to the previous known-good production deployment, then rerun this workflow after fixing the failure.',
              ],
            });
