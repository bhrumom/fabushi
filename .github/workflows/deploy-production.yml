name: CD - Staging E2E gated production deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-production-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  issues: write

jobs:
  build-artifact:
    name: Build release artifact
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
    steps:
      - name: Resolve source commit
        id: source
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "source_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.source_sha }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**
            /.github/workflows/**
            /.github/scripts/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter web release
        run: |
          flutter pub get
          flutter build web --release

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../release-artifact/fabushi/build
          cp -R build/web ../release-artifact/fabushi/build/web
          cp -R web ../release-artifact/fabushi/web
          find ../release-artifact/fabushi/web -path '*/assets/built_in/*' -prune -exec rm -rf {} + || true
          printf '%s\n' "${{ steps.source.outputs.source_sha }}" > ../release-artifact/SOURCE_SHA

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabushi-release-${{ steps.source.outputs.source_sha }}
          path: release-artifact
          retention-days: 30
          if-no-files-found: error

  deploy-staging:
    name: Deploy staging environment
    needs: build-artifact
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ vars.STAGING_APP_URL }}
    defaults:
      run:
        working-directory: release-artifact/fabushi/web
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: fabushi-release-${{ needs.build-artifact.outputs.source_sha }}
          path: release-artifact

      - name: Check Cloudflare credential presence
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: |
          set -euo pipefail
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo "Cloudflare token configured: yes" || echo "Cloudflare token configured: no"
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo "Cloudflare account id configured: yes" || echo "Cloudflare account id configured: no"
          [ -n "${CLOUDFLARE_EMAIL:-}" ] && echo "Cloudflare email configured: yes" || echo "Cloudflare email configured: no"

      - name: Patch development D1 database id
        shell: bash
        env:
          DEVELOPMENT_D1_DATABASE_ID: ${{ vars.DEVELOPMENT_D1_DATABASE_ID || vars.D1_DATABASE_ID || vars.CLOUDFLARE_D1_DATABASE_ID || '7b6318f0-fbc2-42f9-9887-85f878ae76d0' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          path = Path('wrangler.toml')
          text = path.read_text()
          replacement = os.environ['DEVELOPMENT_D1_DATABASE_ID']
          if 'YOUR_DEV_DATABASE_ID' in text:
              text = text.replace('YOUR_DEV_DATABASE_ID', replacement)
              path.write_text(text)
              print('Patched development D1 database id placeholder')
          else:
              print('Development D1 database id placeholder not present')
          PY

      - name: Deploy staging Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: npx --yes wrangler@latest deploy --env development

  staging-e2e:
    name: Staging API and app UI E2E gate
    needs:
      - build-artifact
      - deploy-staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi/e2e
    env:
      STAGING_APP_URL: ${{ vars.STAGING_APP_URL }}
      STAGING_TEST_LOGIN: ${{ secrets.STAGING_TEST_LOGIN }}
      STAGING_TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}
      STAGING_TEST_EMAIL: ${{ vars.STAGING_TEST_EMAIL }}
      STAGING_TEST_PHONE: ${{ vars.STAGING_TEST_PHONE }}
    steps:
      - name: Checkout E2E files
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-artifact.outputs.source_sha }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/e2e/**

      - name: Check staging E2E configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in STAGING_APP_URL STAGING_TEST_LOGIN STAGING_TEST_PASSWORD STAGING_TEST_EMAIL STAGING_TEST_PHONE; do
            if [ -z "${!name:-}" ]; then
              echo "$name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright browsers for web, Android, and iOS UI E2E
        run: npx playwright install chromium webkit --with-deps

      - name: Run staging profile API E2E
        run: npm test

      - name: Run staging profile app UI E2E on web, Android, and iOS projects
        run: npm run test:ui

      - name: Run staging smoke test
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$STAGING_APP_URL" > /tmp/staging-index.html
          test -s /tmp/staging-index.html
          status=$(curl -sS -o /tmp/staging-auth.json -w '%{http_code}' "$STAGING_APP_URL/api/auth/user-info")
          if [ "$status" != "401" ] && [ "$status" != "403" ]; then
            echo "Expected unauthenticated user-info to return 401 or 403, got $status"
            cat /tmp/staging-auth.json
            exit 1
          fi

      - name: Upload staging E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-e2e-playwright-report
          path: fabushi/e2e/playwright-report
          if-no-files-found: ignore

  android-native-install:
    name: Android native package install smoke
    needs:
      - build-artifact
      - staging-e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout Android source and native test helper
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-artifact.outputs.source_sha }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**
            /.github/scripts/**

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Android debug APK for emulator install test
        run: |
          flutter pub get
          flutter build apk --debug --target-platform android-x64

      - name: Install and launch Android APK on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: cd fabushi && bash ../.github/scripts/native-install-smoke.sh android

      - name: Upload Android native install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-native-install-diagnostics
          path: |
            ${{ runner.temp }}/fabushi-android-logcat.txt
          if-no-files-found: ignore

  ios-native-install:
    name: iOS native package install smoke
    needs:
      - build-artifact
      - staging-e2e
    runs-on: macos-15
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout iOS source and native test helper
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-artifact.outputs.source_sha }}
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**
            /.github/scripts/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS simulator app
        run: |
          flutter pub get
          flutter build ios --debug --simulator

      - name: Install and launch iOS app on simulator
        run: bash ../.github/scripts/native-install-smoke.sh ios

      - name: Upload iOS native install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-install-diagnostics
          path: |
            ${{ runner.temp }}/fabushi-ios-simulator.png
          if-no-files-found: ignore

  deploy-production:
    name: Deploy production environment
    needs:
      - build-artifact
      - staging-e2e
      - android-native-install
      - ios-native-install
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_APP_URL || 'https://flutter.ombhrum.com' }}
    defaults:
      run:
        working-directory: release-artifact/fabushi/web
    steps:
      - name: Download validated release artifact
        uses: actions/download-artifact@v4
        with:
          name: fabushi-release-${{ needs.build-artifact.outputs.source_sha }}
          path: release-artifact

      - name: Check production Cloudflare credential presence
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: |
          set -euo pipefail
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo "Cloudflare token configured: yes" || echo "Cloudflare token configured: no"
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo "Cloudflare account id configured: yes" || echo "Cloudflare account id configured: no"
          [ -n "${CLOUDFLARE_EMAIL:-}" ] && echo "Cloudflare email configured: yes" || echo "Cloudflare email configured: no"

      - name: Deploy production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN || secrets.WRANGLER_API_TOKEN || secrets.CLOUDFLARE_TOKEN || secrets.CF_TOKEN || secrets.CLOUDFLARE_API_KEY || vars.CLOUDFLARE_API_TOKEN || vars.CF_API_TOKEN || vars.WRANGLER_API_TOKEN || vars.CLOUDFLARE_TOKEN || vars.CF_TOKEN || vars.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || secrets.CF_ACCOUNT || secrets.CLOUDFLARE_ACCOUNT || vars.CLOUDFLARE_ACCOUNT_ID || vars.CF_ACCOUNT_ID || vars.CF_ACCOUNT || vars.CLOUDFLARE_ACCOUNT }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL || secrets.CF_EMAIL || vars.CLOUDFLARE_EMAIL || vars.CF_EMAIL }}
        run: npx --yes wrangler@latest deploy --env production

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Production deployment"
            echo ""
            echo "- Source SHA: ${{ needs.build-artifact.outputs.source_sha }}"
            echo "- Artifact: fabushi-release-${{ needs.build-artifact.outputs.source_sha }}"
            echo "- Gates: staging API E2E, web/Android/iOS UI E2E, Android native install, iOS native install"
            echo "- URL: ${{ vars.PRODUCTION_APP_URL || 'https://flutter.ombhrum.com' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  production-smoke:
    name: Production smoke test
    needs:
      - build-artifact
      - deploy-production
    runs-on: ubuntu-latest
    env:
      PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL || 'https://flutter.ombhrum.com' }}
    steps:
      - name: Smoke test production site and API auth boundary
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$PRODUCTION_APP_URL" > /tmp/production-index.html
          test -s /tmp/production-index.html
          status=$(curl -sS -o /tmp/production-auth.json -w '%{http_code}' "$PRODUCTION_APP_URL/api/auth/user-info")
          if [ "$status" != "401" ] && [ "$status" != "403" ]; then
            echo "Expected unauthenticated user-info to return 401 or 403, got $status"
            cat /tmp/production-auth.json
            exit 1
          fi

      - name: Write production smoke summary
        shell: bash
        run: |
          {
            echo "## Production smoke test passed"
            echo ""
            echo "- Source SHA: ${{ needs.build-artifact.outputs.source_sha }}"
            echo "- URL: $PRODUCTION_APP_URL"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: Notify deployment failure
    needs:
      - build-artifact
      - deploy-staging
      - staging-e2e
      - android-native-install
      - ios-native-install
      - deploy-production
      - production-smoke
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issue for failed deployment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sourceSha = '${{ needs.build-artifact.outputs.source_sha }}' || context.sha;
            const title = `CD failed for ${sourceSha.substring(0, 7)}`;
            const body = [
              '## CD failure',
              '',
              `- Source SHA: ${sourceSha}`,
              `- Workflow run: ${runUrl}`,
              '- Failed stage: check the workflow job list for the first failed job.',
              '- Gates include staging API E2E, web/Android/iOS UI E2E, Android native install, and iOS native install.',
              '',
              '### Rollback',
              '',
              'Use Cloudflare Workers deployment history to roll back to the previous known-good production deployment, then rerun this workflow after fixing the failure.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['deployment-failure']
            });
