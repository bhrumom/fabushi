name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

jobs:
  flutter:
    name: Flutter analyze, test, and web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout project files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/analysis_options.yaml
            /fabushi/pubspec.yaml
            /fabushi/pubspec.lock
            /fabushi/lib/**
            /fabushi/test/**
            /fabushi/integration_test/**
            /fabushi/assets/**
            !/fabushi/assets/built_in/**
            /fabushi/fonts/**
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release
