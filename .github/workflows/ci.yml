name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter analyze, test, and web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build Flutter web
        run: flutter build web --release

      - name: Upload Flutter web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web
          if-no-files-found: error

  worker:
    name: Cloudflare Worker syntax and dry-run
    runs-on: ubuntu-latest
    needs: flutter
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Flutter web build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Worker JavaScript syntax
        shell: bash
        run: |
          printf '{"type":"module"}\n' > package.json
          find . -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 | xargs -0 -n1 node --check

      - name: Validate Worker bundle with Wrangler dry-run
        run: npx --yes wrangler@latest deploy --dry-run --outdir ../../worker-dry-run

      - name: Upload Worker dry-run bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-dry-run-bundle
          path: worker-dry-run
          if-no-files-found: warn

  pr-changes:
    name: PR changed-file sanity checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed secrets in changed files
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if [ -z "$changed_files" ]; then
            echo "No changed files."
            exit 0
          fi
          echo "$changed_files" | grep -Ev '(^|/)(pubspec.lock|Podfile.lock)$' | while read -r file; do
            if [ -f "$file" ]; then
              if grep -nEi '(api[_-]?key|secret|token|private[_-]?key|password)\s*[:=]\s*["'\''][^"'\'']{8,}' "$file"; then
                echo "Potential secret found in $file"
                exit 1
              fi
            fi
          done
