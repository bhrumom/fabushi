name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: read

jobs:
  flutter:
    name: Flutter quality, tests, build, and web smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout project files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/workflows/**
            /fabushi/analysis_options.yaml
            /fabushi/pubspec.yaml
            /fabushi/pubspec.lock
            /fabushi/lib/**
            /fabushi/test/**
            /fabushi/integration_test/**
            /fabushi/assets/**
            !/fabushi/assets/built_in/**
            /fabushi/fonts/**
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**
            /fabushi/e2e/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Apply Dart formatting
        id: dart-format
        shell: bash
        run: |
          set -euo pipefail
          targets=()
          for path in lib test integration_test; do
            if [ -e "$path" ]; then
              targets+=("$path")
            fi
          done
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Dart source directories found to format."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          dart format "${targets[@]}"

          if git diff --quiet -- "${targets[@]}"; then
            echo "Dart formatting already matched the CI SDK."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Dart formatter changed these files:"
          git diff --name-only -- "${targets[@]}"
          git diff -- "${targets[@]}" > dart-format.patch

      - name: Upload Dart formatting patch
        if: ${{ steps.dart-format.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dart-format-patch
          path: fabushi/dart-format.patch
          if-no-files-found: warn

      - name: Commit Dart formatting changes on main
        if: ${{ steps.dart-format.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in lib test integration_test; do
            if [ -e "$path" ]; then
              git add "$path"
            fi
          done
          git commit -m "style: apply dart format [skip ci]" || exit 0
          git push

      - name: Fail on uncommitted Dart formatting outside main pushes
        if: ${{ steps.dart-format.outputs.changed == 'true' && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        shell: bash
        run: |
          echo "::error::Dart formatting changed files. Run 'dart format lib test integration_test' with the CI Flutter SDK and commit the result."
          exit 1

      - name: Analyze Flutter project
        run: flutter analyze lib/main.dart

      - name: Run Flutter tests
        run: flutter test

      - name: Build web release
        run: flutter build web --release

      - name: Smoke test built web app boot
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8080 --directory build/web > /tmp/fabushi-web.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /tmp/fabushi-index.html; then
              break
            fi
            sleep 1
          done

          test -s /tmp/fabushi-index.html
          google-chrome --headless=new --no-sandbox --disable-dev-shm-usage --virtual-time-budget=10000 --screenshot=/tmp/fabushi-smoke.png http://127.0.0.1:8080/
          test -s /tmp/fabushi-smoke.png

      - name: Upload Flutter web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web
          if-no-files-found: error

  worker:
    name: Cloudflare Worker syntax and deploy dry-run
    runs-on: ubuntu-latest
    needs: flutter
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout Worker files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Download Flutter web build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Worker JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          find . -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 | xargs -0 -n1 node --check

      - name: Validate Worker bundle with Wrangler dry-run
        run: npx --yes wrangler@latest deploy --dry-run --outdir ../../worker-dry-run

      - name: Upload Worker dry-run bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-dry-run-bundle
          path: worker-dry-run
          if-no-files-found: warn

  e2e-contract:
    name: Playwright E2E contract validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi/e2e
    steps:
      - name: Checkout E2E files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/e2e/**

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm ci

      - name: Validate Playwright configuration and test discovery
        run: npx playwright test --list

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - flutter
      - worker
      - e2e-contract
    if: always()
    steps:
      - name: Check required CI jobs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.flutter.result }}" != "success" ]; then
            echo "Flutter job failed: ${{ needs.flutter.result }}"
            exit 1
          fi
          if [ "${{ needs.worker.result }}" != "success" ]; then
            echo "Worker job failed: ${{ needs.worker.result }}"
            exit 1
          fi
          if [ "${{ needs.e2e-contract.result }}" != "success" ]; then
            echo "E2E contract job failed: ${{ needs.e2e-contract.result }}"
            exit 1
          fi
          echo "All CI checks passed."

  notify-ci-failure:
    name: Notify CI failure
    runs-on: ubuntu-latest
    needs:
      - flutter
      - worker
      - e2e-contract
      - ci-result
    if: failure()
    steps:
      - name: Create or update detailed CI failure issue
        uses: actions/github-script@v7
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          SOURCE_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sourceSha = process.env.SOURCE_SHA || context.sha;
            const shortSha = sourceSha.substring(0, 7);
            const sourceRef = process.env.SOURCE_REF || context.ref;
            const baseRef = process.env.BASE_REF || '';
            const prNumber = process.env.PR_NUMBER;
            const prUrl = process.env.PR_URL;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const runAttempt = process.env.GITHUB_RUN_ATTEMPT || '';
            const runTitle = `${context.workflow} #${context.runNumber}`;
            const title = `CI failed for ${shortSha}`;

            const escapeCell = (value) => String(value ?? '')
              .replace(/\|/g, '\\|')
              .replace(/\r?\n/g, '<br>');
            const formatDate = (value) => value ? new Date(value).toISOString() : '';

            try {
              const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: context.runId,
                per_page: 100,
              });
              const jobs = jobsResponse.data.jobs || [];
              const relevantJobs = jobs.filter((job) => job.name !== 'Notify CI failure');
              const problemJobs = relevantJobs.filter((job) =>
                ['failure', 'cancelled', 'timed_out', 'action_required'].includes(job.conclusion)
              );

              const jobRows = relevantJobs.map((job) => {
                const failedSteps = (job.steps || [])
                  .filter((step) => ['failure', 'cancelled', 'timed_out', 'action_required'].includes(step.conclusion))
                  .map((step) => `${step.number}. ${step.name} (${step.conclusion})`);
                const stepSummary = failedSteps.length > 0 ? failedSteps.join('<br>') : '-';
                const jobLink = job.html_url ? `[${escapeCell(job.name)}](${job.html_url})` : escapeCell(job.name);
                return `| ${jobLink} | ${escapeCell(job.status)} | ${escapeCell(job.conclusion || 'pending')} | ${escapeCell(stepSummary)} | ${escapeCell(formatDate(job.completed_at))} |`;
              }).join('\n');

              const problemSummary = problemJobs.length > 0
                ? problemJobs.map((job) => `- ${job.html_url ? `[${job.name}](${job.html_url})` : job.name}: ${job.conclusion}`).join('\n')
                : '- No failed job metadata was returned by the GitHub Actions API yet.';

              const body = [
                '## CI failure',
                '',
                `- Workflow run: [${runTitle}](${runUrl})`,
                `- Run ID: ${context.runId}`,
                `- Attempt: ${runAttempt}`,
                `- Trigger: ${context.eventName}`,
                `- Source SHA: ${sourceSha}`,
                `- Source ref: ${sourceRef}`,
                `- Base ref: ${baseRef}`,
                `- Actor: @${context.actor}`,
                prNumber ? `- Pull request: [#${prNumber}](${prUrl})` : null,
                `- Updated: ${new Date().toISOString()}`,
                '',
                '### Failed or blocked jobs',
                '',
                problemSummary,
                '',
                '### Job and step details',
                '',
                '| Job | Status | Conclusion | Failed / blocked steps | Completed at |',
                '| --- | --- | --- | --- | --- |',
                jobRows || '| No jobs returned yet | - | - | - | - |',
                '',
                '### Triage checklist',
                '',
                '1. Open the failed job link above and expand the failed step.',
                '2. Fix the first failing step; downstream skipped jobs usually recover automatically.',
                `3. Re-run failed jobs from the workflow page: ${runUrl}`,
                '',
                '_This issue is created or updated automatically by `.github/workflows/ci.yml` when CI fails._',
              ].filter(Boolean).join('\n');

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: 'ci-failure',
                color: 'd73a4a',
                description: 'CI workflow failed',
              }).catch((error) => {
                if (error.status !== 422) {
                  core.warning(`Could not create ci-failure label: ${error.message}`);
                }
              });

              const existingIssues = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`,
                per_page: 10,
              });
              const existing = existingIssues.data.items.find((item) => item.title === title);

              if (existing) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body,
                  labels: ['ci-failure'],
                });
                core.info(`Updated existing CI failure issue #${existing.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels: ['ci-failure'],
                });
                core.info(`Created CI failure issue #${created.data.number}`);
              }
            } catch (error) {
              core.warning(`Could not create or update CI failure issue: ${error.message}`);
            }
