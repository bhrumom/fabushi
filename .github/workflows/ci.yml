name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter quality, tests, build, and web smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout project files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/workflows/**
            /fabushi/analysis_options.yaml
            /fabushi/pubspec.yaml
            /fabushi/pubspec.lock
            /fabushi/lib/**
            /fabushi/test/**
            /fabushi/integration_test/**
            /fabushi/assets/**
            !/fabushi/assets/built_in/**
            /fabushi/fonts/**
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**
            /fabushi/e2e/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Check Dart formatting
        shell: bash
        run: |
          set -euo pipefail
          targets=()
          for path in lib test integration_test; do
            if [ -e "$path" ]; then
              targets+=("$path")
            fi
          done
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Dart source directories found to format."
            exit 0
          fi
          dart format --set-exit-if-changed "${targets[@]}"

      - name: Analyze Flutter project
        run: flutter analyze lib/main.dart

      - name: Run Flutter tests
        run: flutter test

      - name: Build web release
        run: flutter build web --release

      - name: Smoke test built web app boot
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8080 --directory build/web > /tmp/fabushi-web.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /tmp/fabushi-index.html; then
              break
            fi
            sleep 1
          done

          test -s /tmp/fabushi-index.html
          google-chrome --headless=new --no-sandbox --disable-dev-shm-usage --virtual-time-budget=10000 --screenshot=/tmp/fabushi-smoke.png http://127.0.0.1:8080/
          test -s /tmp/fabushi-smoke.png

      - name: Upload Flutter web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web
          if-no-files-found: error

  worker:
    name: Cloudflare Worker syntax and deploy dry-run
    runs-on: ubuntu-latest
    needs: flutter
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout Worker files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Download Flutter web build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Worker JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          find . -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 | xargs -0 -n1 node --check

      - name: Validate Worker bundle with Wrangler dry-run
        run: npx --yes wrangler@latest deploy --dry-run --outdir ../../worker-dry-run

      - name: Upload Worker dry-run bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-dry-run-bundle
          path: worker-dry-run
          if-no-files-found: warn

  e2e-contract:
    name: Playwright E2E contract validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabushi/e2e
    steps:
      - name: Checkout E2E files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/e2e/**

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm ci

      - name: Validate Playwright configuration and test discovery
        run: npx playwright test --list

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - flutter
      - worker
      - e2e-contract
    if: always()
    steps:
      - name: Check required CI jobs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.flutter.result }}" != "success" ]; then
            echo "Flutter job failed: ${{ needs.flutter.result }}"
            exit 1
          fi
          if [ "${{ needs.worker.result }}" != "success" ]; then
            echo "Worker job failed: ${{ needs.worker.result }}"
            exit 1
          fi
          if [ "${{ needs.e2e-contract.result }}" != "success" ]; then
            echo "E2E contract job failed: ${{ needs.e2e-contract.result }}"
            exit 1
          fi
          echo "All CI checks passed."
