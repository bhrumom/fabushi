name: CI

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read
  issues: write
  pull-requests: read
  statuses: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  FLUTTER_VERSION: '3.41.9'

jobs:
  detect-changes:
    name: Detect changed code areas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      app_changed: ${{ steps.classify.outputs.app_changed }}
      android_changed: ${{ steps.classify.outputs.android_changed }}
      worker_changed: ${{ steps.classify.outputs.worker_changed }}
      frontend_changed: ${{ steps.classify.outputs.frontend_changed }}
      workflow_guard_changed: ${{ steps.classify.outputs.workflow_guard_changed }}
    steps:
      - name: Checkout diff inputs
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/workflows/**
            /.github/scripts/**
            /fabushi/analysis_options.yaml
            /fabushi/l10n.yaml
            /fabushi/pubspec.yaml
            /fabushi/pubspec.lock
            /fabushi/lib/**
            /fabushi/test/**
            /fabushi/integration_test/**
            /fabushi/assets/**
            !/fabushi/assets/built_in/**
            /fabushi/fonts/**
            /fabushi/android/**
            /fabushi/ios/**
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**
            /fabushi/e2e/**
            /frontend/**

      - name: Resolve diff range
        id: range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MG_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail

          base_sha=""
          head_sha=""

          case "$EVENT_NAME" in
            pull_request)
              base_sha="$PR_BASE_SHA"
              head_sha="$PR_HEAD_SHA"
              ;;
            merge_group)
              base_sha="$MG_BASE_SHA"
              head_sha="$MG_HEAD_SHA"
              ;;
            push)
              base_sha="$BEFORE_SHA"
              head_sha="${AFTER_SHA:-$GITHUB_SHA_VALUE}"
              if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
                base_sha=""
              fi
              ;;
            workflow_dispatch)
              head_sha="$(git rev-parse HEAD)"
              base_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
              ;;
            *)
              head_sha="$GITHUB_SHA_VALUE"
              base_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
              ;;
          esac

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Classify changed code areas
        id: classify
        shell: bash
        env:
          BASE_SHA: ${{ steps.range.outputs.base_sha }}
          HEAD_SHA: ${{ steps.range.outputs.head_sha }}
        run: |
          set -euo pipefail

          changed_files="changed-files.txt"
          if [ -n "$BASE_SHA" ] && git rev-parse "$BASE_SHA" >/dev/null 2>&1; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > "$changed_files"
          else
            git diff-tree --root --no-commit-id --name-only -r "$HEAD_SHA" > "$changed_files"
          fi

          app_changed=false
          android_changed=false
          worker_changed=false
          frontend_changed=false
          workflow_guard_changed=false

          app_reasons=()
          android_reasons=()
          worker_reasons=()
          frontend_reasons=()
          guard_reasons=()

          mark_app() {
            app_changed=true
            app_reasons+=("$1")
          }

          mark_android() {
            android_changed=true
            android_reasons+=("$1")
          }

          mark_worker() {
            worker_changed=true
            worker_reasons+=("$1")
          }

          mark_frontend() {
            frontend_changed=true
            frontend_reasons+=("$1")
          }

          mark_guard() {
            workflow_guard_changed=true
            guard_reasons+=("$1")
          }

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              fabushi/android/*)
                mark_app "mobile platform input changed: $path"
                mark_android "android build input changed: $path"
                ;;
              fabushi/ios/*)
                mark_app "mobile platform input changed: $path"
                ;;
              fabushi/lib/*|fabushi/test/*|fabushi/integration_test/*|fabushi/assets/*|fabushi/fonts/*|fabushi/pubspec.yaml|fabushi/pubspec.lock|fabushi/analysis_options.yaml|fabushi/l10n.yaml)
                mark_app "shared Flutter app input changed: $path"
                mark_android "android build depends on shared Flutter app input: $path"
                ;;
              fabushi/web/*|fabushi/e2e/*)
                mark_worker "worker or deploy gate input changed: $path"
                mark_guard "workflow guardrails cover worker/deploy path: $path"
                ;;
              frontend/*)
                mark_frontend "frontend workspace input changed: $path"
                ;;
              .github/workflows/*|.github/workflows/*/*|.github/scripts/*|.github/scripts/*/*)
                mark_worker "deployment or package-release workflow input changed: $path"
                mark_guard "workflow guardrail input changed: $path"
                ;;
            esac
          done < "$changed_files"

          {
            echo "app_changed=$app_changed"
            echo "android_changed=$android_changed"
            echo "worker_changed=$worker_changed"
            echo "frontend_changed=$frontend_changed"
            echo "workflow_guard_changed=$workflow_guard_changed"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Changed code area detection"
            echo ""
            echo "- App changed: $app_changed"
            echo "- Android build changed: $android_changed"
            echo "- Worker or deploy runtime changed: $worker_changed"
            echo "- Frontend changed: $frontend_changed"
            echo "- Workflow guardrails changed: $workflow_guard_changed"
            echo ""
            echo "### Reasons"
            echo ""
            if [ "${#app_reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${app_reasons[@]}" | awk '!seen[$0]++ { printf "- App: `%s`\n", $0 }'
            fi
            if [ "${#android_reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${android_reasons[@]}" | awk '!seen[$0]++ { printf "- Android: `%s`\n", $0 }'
            fi
            if [ "${#worker_reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${worker_reasons[@]}" | awk '!seen[$0]++ { printf "- Worker/CD: `%s`\n", $0 }'
            fi
            if [ "${#frontend_reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${frontend_reasons[@]}" | awk '!seen[$0]++ { printf "- Frontend: `%s`\n", $0 }'
            fi
            if [ "${#guard_reasons[@]}" -gt 0 ]; then
              printf '%s\n' "${guard_reasons[@]}" | awk '!seen[$0]++ { printf "- Guardrail: `%s`\n", $0 }'
            fi
            if [ ! -s "$changed_files" ]; then
              echo "- No changed files were detected."
            fi
            echo ""
            echo "### Changed files"
            echo ""
            sed 's/^/- `/' "$changed_files" | sed 's/$/`/' || true
          } >> "$GITHUB_STEP_SUMMARY"

  fast-checks:
    name: Fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout project files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/workflows/**
            /fabushi/analysis_options.yaml
            /fabushi/pubspec.yaml
            /fabushi/pubspec.lock
            /fabushi/lib/**
            /fabushi/test/**
            /fabushi/integration_test/**
            /fabushi/assets/**
            !/fabushi/assets/built_in/**
            /fabushi/fonts/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Apply Dart formatting
        id: dart-format
        shell: bash
        run: |
          set -euo pipefail
          targets=()
          for path in lib test integration_test; do
            if [ -e "$path" ]; then
              targets+=("$path")
            fi
          done
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Dart source directories found to format."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          dart format "${targets[@]}"

          if git diff --quiet -- "${targets[@]}"; then
            echo "Dart formatting already matched the pinned CI SDK."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Dart formatter changed these files:"
          git diff --name-only -- "${targets[@]}"
          git diff -- "${targets[@]}" > dart-format.patch

      - name: Upload Dart formatting patch
        if: ${{ steps.dart-format.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: dart-format-patch
          path: fabushi/dart-format.patch
          if-no-files-found: warn

      - name: Continue after CI-applied Dart formatting
        if: ${{ steps.dart-format.outputs.changed == 'true' }}
        shell: bash
        run: |
          echo "::notice::Dart formatting changed files. CI will continue with the formatted workspace; the uploaded dart-format-patch artifact is informational."
          echo "::notice::CI no longer pushes formatter commits directly to main because main is protected by merge queue rules."

      - name: Analyze Flutter project
        run: flutter analyze lib/main.dart

      - name: Run Flutter tests
        run: flutter test

  mobile-release-simulation:
    name: Release simulation - mobile web build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true' || needs.detect-changes.outputs.worker_changed == 'true'
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout project files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release

      - name: Smoke test built web app boot
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8080 --directory build/web > /tmp/fabushi-web.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /tmp/fabushi-index.html; then
              break
            fi
            sleep 1
          done

          test -s /tmp/fabushi-index.html
          google-chrome --headless=new --no-sandbox --disable-dev-shm-usage --virtual-time-budget=10000 --screenshot=/tmp/fabushi-smoke.png http://127.0.0.1:8080/
          test -s /tmp/fabushi-smoke.png

      - name: Upload Flutter web build
        uses: actions/upload-artifact@v7
        with:
          name: flutter-web-build
          path: fabushi/build/web
          if-no-files-found: error

  android-gradle-bootstrap:
    name: Release simulation - Android Gradle bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.android_changed == 'true'
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout Android build files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/**
            !/fabushi/assets/built_in/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Write Android local.properties
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "flutter.sdk=$FLUTTER_ROOT"
            echo "sdk.dir=$ANDROID_HOME"
          } > android/local.properties

      - name: Get Flutter dependencies for Android build scripts
        run: flutter pub get

      - name: Validate Android Gradle bootstrap
        shell: bash
        env:
          GRADLE_OPTS: -Xmx4g -Dfile.encoding=UTF-8
        run: |
          set -euo pipefail
          flutter build apk --debug --config-only

  worker-module-checks:
    name: Module checks - Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.worker_changed == 'true'
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout Worker files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Worker JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          find . -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 | xargs -0 -n1 node --check

      - name: Run profile update D1 transaction regression
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          node tests/profile.test.js

  worker-contract-checks:
    name: Contract checks - Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.worker_changed == 'true'
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout Worker files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Worker contract tests
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          find tests -maxdepth 1 -name '*.test.js' ! -name 'profile.test.js' -print0 | sort -z > /tmp/worker-tests
          if [ ! -s /tmp/worker-tests ]; then
            echo "No remaining Worker contract tests found."
            exit 0
          fi
          xargs -0 node --test --test-concurrency=1 < /tmp/worker-tests

  worker-release-simulation:
    name: Release simulation - Worker dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - detect-changes
      - mobile-release-simulation
      - worker-module-checks
    if: needs.detect-changes.outputs.worker_changed == 'true'
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout Worker files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Download Flutter web build
        uses: actions/download-artifact@v5
        with:
          name: flutter-web-build
          path: fabushi/build/web

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate Worker bundle with Wrangler dry-run
        run: npx --yes wrangler@latest deploy --dry-run --outdir ../../worker-dry-run

      - name: Upload Worker dry-run bundle
        uses: actions/upload-artifact@v7
        with:
          name: worker-dry-run-bundle
          path: worker-dry-run
          if-no-files-found: warn

  e2e-release-simulation:
    name: Release simulation - staging E2E contract validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.worker_changed == 'true'
    defaults:
      run:
        working-directory: fabushi/e2e
    steps:
      - name: Checkout E2E files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/e2e/**

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install E2E dependencies
        run: npm ci

      - name: Validate the staging E2E script used by CD
        run: npm test -- --list

  frontend-module-checks:
    name: Module checks - Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout frontend workspace
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /frontend/**

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend typecheck
        run: pnpm typecheck

      - name: Build Next.js site
        run: pnpm build:web

  workflow-contract-checks:
    name: Contract checks - Workflow guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.workflow_guard_changed == 'true'
    steps:
      - name: Checkout workflow files
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/workflows/**
            /.github/scripts/**
            /fabushi/web/auth-utils.js
            /fabushi/web/migrations/**
            /fabushi/web/schema.sql
            /fabushi/web/schema_v2.sql
            /fabushi/web/src/contracts/**
            /fabushi/web/src/repositories/**
            /fabushi/web/src/routes/**
            /fabushi/web/src/services/database.js
            /fabushi/web/src/use-cases/**
            /fabushi/web/src/handlers/auth.js
            /fabushi/web/src/handlers/password-login.js
            /fabushi/web/src/handlers/profile.js
            /fabushi/web/src/handlers/thirdparty.js
            /fabushi/web/tests/auth-user-id.test.js
            /fabushi/web/tests/database-user-id.test.js
            /fabushi/web/tests/profile.test.js

      - name: Validate publish release workflow guardrail
        shell: bash
        run: bash .github/scripts/check-publish-cd-release.sh

  module-checks:
    name: Module checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
      - worker-module-checks
      - frontend-module-checks
    steps:
      - name: Confirm module check results
        shell: bash
        run: |
          set -euo pipefail
          for pair in \
            "Worker module checks:${{ needs.worker-module-checks.result }}" \
            "Frontend module checks:${{ needs.frontend-module-checks.result }}"
          do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$name failed: $result"
              exit 1
            fi
          done

  contract-checks:
    name: Contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
      - worker-contract-checks
      - workflow-contract-checks
    steps:
      - name: Confirm contract check results
        shell: bash
        run: |
          set -euo pipefail
          for pair in \
            "Worker contract checks:${{ needs.worker-contract-checks.result }}" \
            "Workflow contract checks:${{ needs.workflow-contract-checks.result }}"
          do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$name failed: $result"
              exit 1
            fi
          done

  release-simulation:
    name: Release simulation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
      - mobile-release-simulation
      - android-gradle-bootstrap
      - worker-release-simulation
      - e2e-release-simulation
    steps:
      - name: Confirm release simulation results
        shell: bash
        run: |
          set -euo pipefail
          for pair in \
            "Mobile release simulation:${{ needs.mobile-release-simulation.result }}" \
            "Android Gradle bootstrap:${{ needs.android-gradle-bootstrap.result }}" \
            "Worker dry-run:${{ needs.worker-release-simulation.result }}" \
            "E2E release simulation:${{ needs.e2e-release-simulation.result }}"
          do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$name failed: $result"
              exit 1
            fi
          done

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-changes
      - fast-checks
      - module-checks
      - contract-checks
      - release-simulation
    if: always()
    steps:
      - name: Check required CI jobs
        shell: bash
        run: |
          set -euo pipefail
          for pair in \
            "Fast checks:${{ needs.fast-checks.result }}" \
            "Module checks:${{ needs.module-checks.result }}" \
            "Contract checks:${{ needs.contract-checks.result }}" \
            "Release simulation:${{ needs.release-simulation.result }}"
          do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "$name failed: $result"
              exit 1
            fi
          done
          echo "Relevant CI checks passed or were intentionally skipped."

  notify-ci-failure:
    name: Notify CI failure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect-changes
      - fast-checks
      - mobile-release-simulation
      - android-gradle-bootstrap
      - worker-module-checks
      - worker-contract-checks
      - worker-release-simulation
      - e2e-release-simulation
      - frontend-module-checks
      - workflow-contract-checks
      - module-checks
      - contract-checks
      - release-simulation
      - ci-result
    if: failure()
    steps:
      - name: Checkout failure notifier
        uses: actions/checkout@v5
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**

      - name: Create or update detailed CI failure issue
        uses: actions/github-script@v8
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          SOURCE_REF: ${{ github.event.pull_request.head.ref || github.event.merge_group.head_ref || github.ref_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
        with:
          script: |
            const { createOrUpdateFailureIssue } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await createOrUpdateFailureIssue({
              github,
              context,
              core,
              kind: 'CI',
              titlePrefix: 'CI failed for',
              sourceSha: process.env.SOURCE_SHA || context.sha,
              sourceRef: process.env.SOURCE_REF || '',
              baseRef: process.env.BASE_REF || '',
              prNumber: process.env.PR_NUMBER || '',
              prUrl: process.env.PR_URL || '',
              labelName: 'ci-failure',
              labelColor: 'd73a4a',
              labelDescription: 'CI workflow failed',
