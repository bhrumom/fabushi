name: CI

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read
  issues: write
  pull-requests: read
  statuses: read

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  flutter:
    name: Flutter quality, tests, build, and web smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: fabushi
    steps:
      - name: Checkout project files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/workflows/**
            /fabushi/analysis_options.yaml
            /fabushi/pubspec.yaml
            /fabushi/pubspec.lock
            /fabushi/lib/**
            /fabushi/test/**
            /fabushi/integration_test/**
            /fabushi/assets/**
            !/fabushi/assets/built_in/**
            /fabushi/fonts/**
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**
            /fabushi/e2e/**

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Apply Dart formatting
        id: dart-format
        shell: bash
        run: |
          set -euo pipefail
          targets=()
          for path in lib test integration_test; do
            if [ -e "$path" ]; then
              targets+=("$path")
            fi
          done
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Dart source directories found to format."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          dart format "${targets[@]}"

          if git diff --quiet -- "${targets[@]}"; then
            echo "Dart formatting already matched the pinned CI SDK."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Dart formatter changed these files:"
          git diff --name-only -- "${targets[@]}"
          git diff -- "${targets[@]}" > dart-format.patch

      - name: Upload Dart formatting patch
        if: ${{ steps.dart-format.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dart-format-patch
          path: fabushi/dart-format.patch
          if-no-files-found: warn

      - name: Continue after CI-applied Dart formatting
        if: ${{ steps.dart-format.outputs.changed == 'true' }}
        shell: bash
        run: |
          echo "::notice::Dart formatting changed files. CI will continue with the formatted workspace; the uploaded dart-format-patch artifact is informational."
          echo "::notice::CI no longer pushes formatter commits directly to main because main is protected by merge queue rules."

      - name: Analyze Flutter project
        run: flutter analyze lib/main.dart

      - name: Run Flutter tests
        run: flutter test

      - name: Build web release
        run: flutter build web --release

      - name: Smoke test built web app boot
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8080 --directory build/web > /tmp/fabushi-web.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /tmp/fabushi-index.html; then
              break
            fi
            sleep 1
          done

          test -s /tmp/fabushi-index.html
          google-chrome --headless=new --no-sandbox --disable-dev-shm-usage --virtual-time-budget=10000 --screenshot=/tmp/fabushi-smoke.png http://127.0.0.1:8080/
          test -s /tmp/fabushi-smoke.png

      - name: Upload Flutter web build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web
          if-no-files-found: error

  worker:
    name: Cloudflare Worker syntax and deploy dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: flutter
    defaults:
      run:
        working-directory: fabushi/web
    steps:
      - name: Checkout Worker files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/web/**
            !/fabushi/web/assets/built_in/**

      - name: Download Flutter web build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: fabushi/build/web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Worker JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          find . -type f -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './build/*' \
            -print0 | xargs -0 -n1 node --check

      - name: Run Worker contract tests
        shell: bash
        run: |
          set -euo pipefail
          printf '{"type":"module"}\n' > package.json
          node --test tests/*.test.js

      - name: Validate Worker bundle with Wrangler dry-run
        run: npx --yes wrangler@latest deploy --dry-run --outdir ../../worker-dry-run

      - name: Upload Worker dry-run bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-dry-run-bundle
          path: worker-dry-run
          if-no-files-found: warn

  e2e-contract:
    name: Playwright E2E contract validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: fabushi/e2e
    steps:
      - name: Checkout E2E files
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /fabushi/e2e/**

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm ci

      - name: Validate Playwright configuration and test discovery
        run: npx playwright test --list

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - flutter
      - worker
      - e2e-contract
    if: always()
    steps:
      - name: Check required CI jobs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.flutter.result }}" != "success" ]; then
            echo "Flutter job failed: ${{ needs.flutter.result }}"
            exit 1
          fi
          if [ "${{ needs.worker.result }}" != "success" ]; then
            echo "Worker job failed: ${{ needs.worker.result }}"
            exit 1
          fi
          if [ "${{ needs.e2e-contract.result }}" != "success" ]; then
            echo "E2E contract job failed: ${{ needs.e2e-contract.result }}"
            exit 1
          fi
          echo "All CI checks passed."

  notify-ci-failure:
    name: Notify CI failure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - flutter
      - worker
      - e2e-contract
      - ci-result
    if: failure()
    steps:
      - name: Checkout failure notifier
        uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/scripts/**

      - name: Create or update detailed CI failure issue
        uses: actions/github-script@v7
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          SOURCE_REF: ${{ github.event.pull_request.head.ref || github.event.merge_group.head_ref || github.ref_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
        with:
          script: |
            const { createOrUpdateFailureIssue } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/create-failure-issue.js`);
            await createOrUpdateFailureIssue({
              github,
              context,
              core,
              kind: 'CI',
              titlePrefix: 'CI failed for',
              sourceSha: process.env.SOURCE_SHA || context.sha,
              sourceRef: process.env.SOURCE_REF || '',
              baseRef: process.env.BASE_REF || '',
              prNumber: process.env.PR_NUMBER || '',
              prUrl: process.env.PR_URL || '',
              labelName: 'ci-failure',
              labelColor: 'd73a4a',
              labelDescription: 'CI workflow failed',
              notifyJobName: 'Notify CI failure',
              extraSections: [
                '### CI notes',
                '',
                '- Dart format diffs are uploaded as `dart-format-patch` when formatter output differs from the committed code.',
                '- CI runs with the formatter-applied workspace and does not push formatter commits directly to protected branches.',
                '- Build and dry-run bundles are listed above when those jobs reach their upload steps.',
                '- Merge queue runs are supported through the `merge_group` trigger.',
              ],
            });
